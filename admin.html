  .sb-section-label {

    text-transform: uppercase;

  .sb-link {

    border-radius: 7px;
    color: #666;
    font-size: 13px;
    font-weight: 500;

    text-align: center;
    flex-shrink: 0;

  .sb-divider {

    background: #1a1a1a;
    margin: 8px 14px;
    flex-shrink: 0;
  }

  .sb-bottom {
    margin-top: auto;
    padding: 12px;
    border-top: 1px solid #1a1a1a;
    flex-shrink: 0;
  }
  .sb-user {
    font-size: 11px;
    color: #3a3a3a;
    padding: 0 4px;
    margin-bottom: 8px;
  }
  .sb-signout {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #444;
    cursor: pointer;
    padding: 6px 8px;
    border-radius: 6px;
    transition: all 120ms;
    text-decoration: none;
    background: none;
    border: none;
    font-family: inherit;
    width: 100%;
    text-align: left;

    overflow: hidden;
    background: #111;
    min-width: 0;

  #top-bar {

    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 10px;
    flex-shrink: 0;
  }
  #page-label {
    font-size: 12px;
    color: #444;

  #page-label-name {

  .top-bar-right {

    align-items: center;

  .tb-link {
    font-size: 12px;
    color: #444;
    text-decoration: none;
    padding: 5px 10px;
    border-radius: 5px;

  .tb-cta {
    background: #00AFF0;
    color: #000;
    font-size: 11px;
    font-weight: 800;
    padding: 6px 14px;
    border-radius: 6px;
    text-decoration: none;
    transition: opacity 120ms;
  }
  .tb-cta:hover { opacity: 0.85; }

  /* ── CONTENT WRAP + IFRAME ── */
  #content-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  #content-frame {
    flex: 1;
    border: none;
    width: 100%;
    height: 0; /* flex grows this */
  }

  /* ── LOADING ── */
  #frame-loader {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #111;
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 150ms;
  }
  #frame-loader.show { opacity: 1; pointer-events: all; }
  .loader-spinner {
    width: 28px;
    height: 28px;
    border: 2px solid #1e1e1e;
    border-top-color: #00AFF0;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
