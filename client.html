<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Portal — OnlyDwarfs</title>
  <meta name="description" content="Create a client profile or look up your booking history with OnlyDwarfs. Book faster, track your events, get priority access." />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="stylesheet" href="colors_and_type.css" />
  <link rel="stylesheet" href="site.css" />
  <link rel="stylesheet" href="intake.css" />
  <link rel="stylesheet" href="portal.css" />
  <style>
    /* Account for fixed nav height on intake pages */
    .od-intake { padding-top: 64px; }
    .od-intake-aside-inner { top: 104px; }
    .od-intake-progress-bar { top: 64px; }
    .od-intake-group-head { top: 154px; }
  </style>
</head>
<body>
  <div id="root" data-screen-label="Client Portal"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="components/Nav.jsx?v=2"></script>
  <script type="text/babel" src="components/Footer.jsx?v=2"></script>
  <script type="text/babel" src="components/ClientPortal.jsx"></script>

  <script type="text/babel">
    const App = () => (
      <>
        <Nav />
        <ClientPortal />
        <Footer />
      </>
    );
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
