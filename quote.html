<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quote Generator — OnlyDwarfs</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { background:#0D0D1A; color:#EFEFEF; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; padding:20px 16px 48px; }

/* ── HEADER ── */
.header { text-align:center; margin-bottom:24px; }
.header h1 { font-size:18px; font-weight:700; color:#C9A84C; letter-spacing:2px; text-transform:uppercase; }
.header p { font-size:12px; color:#555; margin-top:4px; }

/* ── CARDS ── */
.card { background:#161628; border-radius:14px; padding:18px; margin-bottom:14px; border:1px solid #1E1E38; }
.card-title { font-size:10px; font-weight:700; color:#C9A84C; letter-spacing:1.8px; text-transform:uppercase; margin-bottom:14px; display:flex; justify-content:space-between; align-items:center; }
.badge { font-size:9px; background:#C9A84C1A; color:#C9A84C88; padding:2px 8px; border-radius:99px; letter-spacing:0.3px; }

/* ── FIELDS ── */
.field { margin-bottom:12px; }
.field:last-child { margin-bottom:0; }
.field > label { display:block; font-size:10px; font-weight:700; color:#555; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:5px; }
.row-2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }

/* ── BASE INPUT ── */
.inp {
  width:100%; background:#0C0C1E; border:1.5px solid #1E1E38; border-radius:10px;
  color:#EFEFEF; font-size:15px; padding:12px 14px; outline:none;
  transition:border-color .2s,background .2s; -webkit-appearance:none; font-family:inherit;
  cursor:pointer;
}
.inp:focus { border-color:#C9A84C44; background:#0F0F22; }
.inp.filled { border-color:#C9A84C33; color:#EFEFEF; }
.inp::placeholder { color:#333; }
select.inp option { background:#161628; }

/* ── SEARCH INPUT with icon ── */
.search-wrap { position:relative; }
.search-wrap .inp { padding-left:38px; }
.search-wrap .s-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:15px; pointer-events:none; opacity:0.4; }
.search-wrap .clear-btn { position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; color:#444; font-size:18px; cursor:pointer; padding:4px; display:none; line-height:1; }
.search-wrap .clear-btn.show { display:block; }

/* ── DROPDOWN LIST ── */
.dropdown { position:absolute; top:calc(100% + 4px); left:0; right:0; background:#1A1A30; border:1.5px solid #2A2A48; border-radius:10px; z-index:100; max-height:200px; overflow-y:auto; display:none; box-shadow:0 8px 32px #00000066; }
.dropdown.open { display:block; }
.dropdown-item { padding:11px 14px; font-size:14px; cursor:pointer; border-bottom:1px solid #1E1E38; transition:background .1s; }
.dropdown-item:last-child { border-bottom:none; }
.dropdown-item:active, .dropdown-item.focused { background:#222240; color:#C9A84C; }
.dropdown-item .sub { font-size:11px; color:#555; margin-top:1px; }
.dropdown-empty { padding:14px; font-size:13px; color:#444; text-align:center; }

/* ── DATE PICKER ── */
.date-display { display:flex; align-items:center; gap:10px; }
.date-icon { font-size:18px; opacity:0.5; }
.date-text { flex:1; font-size:15px; color:#555; }
.date-text.set { color:#EFEFEF; }

.cal-overlay { position:fixed; inset:0; background:#000000BB; z-index:200; display:none; align-items:flex-end; justify-content:center; padding:0; }
.cal-overlay.open { display:flex; }
.cal-sheet { background:#161628; border-radius:20px 20px 0 0; width:100%; max-width:480px; padding:20px; padding-bottom:32px; }
.cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.cal-header h3 { font-size:16px; font-weight:700; color:#EFEFEF; }
.cal-nav { background:none; border:none; color:#C9A84C; font-size:22px; padding:4px 10px; cursor:pointer; line-height:1; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
.cal-day-label { text-align:center; font-size:10px; font-weight:700; color:#444; padding:6px 0; text-transform:uppercase; }
.cal-day { text-align:center; padding:10px 4px; font-size:14px; border-radius:8px; cursor:pointer; transition:all .15s; min-height:38px; display:flex; align-items:center; justify-content:center; }
.cal-day:empty { background:transparent; cursor:default; }
.cal-day.other { color:#2A2A44; cursor:default; }
.cal-day.today { color:#C9A84C; font-weight:700; }
.cal-day.selected { background:#C9A84C; color:#0D0D1A; font-weight:700; border-radius:8px; }
.cal-day.past { color:#2A2A44; cursor:default; }
.cal-day:not(.other):not(.past):not(.selected):active { background:#222240; }
.cal-close { width:100%; padding:13px; background:#222240; border:none; border-radius:10px; color:#EFEFEF; font-size:14px; font-weight:600; cursor:pointer; margin-top:14px; }

/* ── TOGGLE ── */
.toggle-row { display:flex; background:#0C0C1E; border:1.5px solid #1E1E38; border-radius:10px; overflow:hidden; }
.toggle-row input[type=radio] { display:none; }
.toggle-row label { flex:1; text-align:center; padding:12px 8px; font-size:13px; font-weight:600; color:#444; cursor:pointer; margin:0; transition:all .2s; }
.toggle-row input[type=radio]:checked + label { background:#C9A84C; color:#0D0D1A; }

/* ── COUNTER ── */
.counter { display:flex; align-items:center; background:#0C0C1E; border:1.5px solid #1E1E38; border-radius:10px; overflow:hidden; }
.counter button { background:none; border:none; color:#C9A84C; font-size:24px; padding:8px 16px; cursor:pointer; line-height:1; flex-shrink:0; }
.counter-val { flex:1; text-align:center; font-size:18px; font-weight:700; }

/* ── COLLAPSIBLE RATES ── */
.rates-toggle { display:flex; align-items:center; justify-content:space-between; cursor:pointer; padding:4px 0; user-select:none; }
.rates-toggle span { font-size:13px; color:#666; font-weight:500; }
.rates-toggle .arrow { font-size:12px; color:#444; transition:transform .2s; }
.rates-toggle.open .arrow { transform:rotate(180deg); }
.rates-body { display:none; margin-top:14px; }
.rates-body.open { display:block; }

.rate-field label { color:#3A5A7A; }
.rate-field .inp { color:#7AABCC; border-color:#1E3048; }
.rate-field .inp:focus { border-color:#C9A84C44; color:#EFEFEF; }

.inp-prefix { position:relative; }
.inp-prefix .pre { position:absolute; left:13px; top:50%; transform:translateY(-50%); color:#444; font-size:15px; pointer-events:none; }
.inp-prefix .inp { padding-left:24px; }

/* ── ADD-ONS ── */
.addon-row { display:grid; grid-template-columns:1fr 100px 36px; gap:8px; align-items:center; margin-bottom:8px; }
.addon-remove { background:#1E0A0A; border:1.5px solid #3A1A1A; border-radius:8px; color:#C0392B; font-size:18px; cursor:pointer; height:40px; display:flex; align-items:center; justify-content:center; }
.btn-addon { background:none; border:1.5px dashed #222240; border-radius:8px; color:#444; font-size:13px; padding:10px; width:100%; cursor:pointer; margin-top:4px; }
.btn-addon:active { border-color:#C9A84C44; color:#C9A84C; }

/* ── PRICING PREVIEW ── */
#pricing-preview { display:none; }
.price-row { display:flex; justify-content:space-between; align-items:baseline; padding:8px 0; border-bottom:1px solid #1A1A30; font-size:14px; gap:8px; }
.price-row:last-child { border-bottom:none; padding-bottom:0; }
.price-row .pl { color:#666; flex:1; }
.price-row .pv { font-weight:700; color:#EFEFEF; white-space:nowrap; }
.price-row.total { padding-top:12px; }
.price-row.total .pl { color:#EFEFEF; font-weight:700; font-size:15px; }
.price-row.total .pv { color:#C9A84C; font-size:20px; }
.price-row.dep .pv { color:#9B59B6; }
.price-row.int .pl,.price-row.int .pv { color:#333; font-size:12px; }
.price-row.int .pv { font-weight:500; }
.price-row.cut .pl { color:#2ECC71; font-size:13px; font-weight:700; }
.price-row.cut .pv { color:#2ECC71; font-size:16px; font-weight:800; }
.price-row.cut .pl { color:#27AE60; font-size:13px; font-weight:600; }
.price-row.cut .pv { color:#27AE60; font-size:15px; font-weight:700; }

/* ── BUTTONS ── */
.btn { width:100%; padding:15px; border:none; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer; transition:opacity .15s; }
.btn:active { opacity:.8; }
.btn-gold { background:#C9A84C; color:#0D0D1A; margin-bottom:14px; }
.btn-outline { background:#161628; color:#EFEFEF; border:1.5px solid #2A2A48; }
.btn-copy { background:#1A2A3A; color:#EFEFEF; border:1.5px solid #2A3A4A; margin-top:12px; }
.btn-copy.copied { background:#1A4A2A; border-color:#27AE60; color:#27AE60; }

/* ── OUTPUT ── */
#output-section { display:none; }
.email-box { background:#0C0C1E; border:1.5px solid #1E1E38; border-radius:10px; padding:14px; font-size:13px; line-height:1.75; color:#EFEFEF; white-space:pre-wrap; word-break:break-word; }
.reset-link { text-align:center; margin-top:16px; }
.reset-link a { color:#333; font-size:13px; text-decoration:none; }

.warning { background:#1E1000; border-left:3px solid #C9A84C88; border-radius:8px; padding:11px 13px; font-size:11px; color:#C9A84C77; margin-bottom:14px; line-height:1.5; }
hr { border:none; border-top:1px solid #1A1A30; margin:12px 0; }

/* ── OVERLAY BACKDROP for dropdowns ── */
.backdrop { position:fixed; inset:0; z-index:50; display:none; }
.backdrop.show { display:block; }
</style>
</head>
<body>

<div class="header">
  <h1>⚡ Quote Generator</h1>
  <p>OnlyDwarfs Entertainment</p>
</div>

<!-- BACKDROP -->
<div class="backdrop" id="backdrop" onclick="closeAllDropdowns()"></div>

<!-- CALENDAR OVERLAY -->
<div class="cal-overlay" id="cal-overlay" onclick="calOverlayClick(event)">
  <div class="cal-sheet">
    <div class="cal-header">
      <button class="cal-nav" onclick="calNav(-1)">‹</button>
      <h3 id="cal-month-label"></h3>
      <button class="cal-nav" onclick="calNav(1)">›</button>
    </div>
    <div class="cal-grid" id="cal-day-labels"></div>
    <div class="cal-grid" id="cal-grid"></div>
    <button class="cal-close" onclick="closeCalendar()">Done</button>
  </div>
</div>

<!-- ═══════ FORM ═══════ -->
<div id="form-section">

  <div class="warning">⚠️ Check talent roster for nearby performers before sending.</div>

  <!-- CLIENT INFO -->
  <div class="card">
    <div class="card-title">Client Info</div>

    <div class="field">
      <label>Client Name</label>
      <input class="inp" type="text" id="client-name" placeholder="Full name" autocomplete="off">
    </div>

    <div class="row-2">
      <!-- STATE SEARCH -->
      <div class="field">
        <label>State</label>
        <div class="search-wrap" id="state-wrap" style="position:relative">
          <span class="s-icon">📍</span>
          <input class="inp" type="text" id="state-input" placeholder="Search state..." autocomplete="off" oninput="filterStates()" onfocus="openDropdown('state')" onkeydown="ddKeydown(event,'state')">
          <button class="clear-btn" id="state-clear" onclick="clearField('state')">×</button>
          <div class="dropdown" id="state-dropdown"></div>
        </div>
      </div>

      <!-- CITY SEARCH -->
      <div class="field">
        <label>City</label>
        <div class="search-wrap" id="city-wrap" style="position:relative">
          <span class="s-icon">🏙</span>
          <input class="inp" type="text" id="city-input" placeholder="Search city..." autocomplete="off" oninput="filterCities()" onfocus="openDropdown('city')" onkeydown="ddKeydown(event,'city')">
          <button class="clear-btn" id="city-clear" onclick="clearField('city')">×</button>
          <div class="dropdown" id="city-dropdown"></div>
        </div>
      </div>
    </div>

    <div class="field">
      <label>Event Type</label>
      <input class="inp" type="text" id="event-type" placeholder="Bachelor party, birthday, corporate..." autocomplete="off">
    </div>

    <!-- DATE PICKER -->
    <div class="field">
      <label>Event Date</label>
      <div class="inp date-display" onclick="openCalendar()" style="cursor:pointer">
        <span class="date-icon">📅</span>
        <span class="date-text" id="date-display-text">Tap to pick a date</span>
      </div>
      <input type="hidden" id="event-date">
    </div>
  </div>

  <!-- ENTERTAINMENT -->
  <div class="card">
    <div class="card-title">Entertainment</div>

    <div class="field">
      <label>Type</label>
      <select class="inp" id="ent-type" onchange="onEntTypeChange()">
        <option value="">— Select entertainment type —</option>
        <optgroup label="Standard">
          <option value="character">Character / Party Appearance</option>
          <option value="female">Female Stripper / Adult Entertainment</option>
          <option value="male">Male Stripper / Adult Entertainment</option>
        </optgroup>
        <optgroup label="Specialty">
          <option value="tossing">Dwarf Tossing</option>
          <option value="promo">Promotional Appearance</option>
          <option value="corporate">Corporate Event</option>
          <option value="film">Film / Commercial</option>
          <option value="custom">Custom / Other</option>
        </optgroup>
      </select>
    </div>

    <div class="field" id="custom-label-field" style="display:none">
      <label>Custom Type Label</label>
      <input class="inp" type="text" id="custom-type-label" placeholder="e.g. Stilt Walker, Magician..." autocomplete="off">
    </div>

    <div class="field">
      <label>Location</label>
      <div class="toggle-row">
        <input type="radio" name="location" id="loc-local" value="local" checked onchange="onLocationChange()">
        <label for="loc-local">In-State (Local)</label>
        <input type="radio" name="location" id="loc-oos" value="oos" onchange="onLocationChange()">
        <label for="loc-oos">Out of State</label>
      </div>
    </div>

    <div class="row-2">
      <div class="field">
        <label>Performers</label>
        <div class="counter">
          <button onclick="changePerformers(-1)">−</button>
          <div class="counter-val" id="performer-count">1</div>
          <button onclick="changePerformers(1)">+</button>
        </div>
      </div>
      <div class="field">
        <label>Duration (hrs)</label>
        <div class="counter">
          <button onclick="changeDuration(-0.5)">−</button>
          <div class="counter-val" id="duration-val">2</div>
          <button onclick="changeDuration(0.5)">+</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ADD-ONS -->
  <div class="card">
    <div class="card-title">Add-Ons & Extra Charges</div>
    <div id="addon-list"></div>
    <button class="btn-addon" onclick="addAddon()">+ Add line item</button>
  </div>

  <!-- PRICING PREVIEW -->
  <div class="card" id="pricing-preview">
    <div class="card-title">💰 Pricing Preview</div>
    <div id="pricing-rows"></div>
  </div>

  <!-- CUSTOM RATES (collapsed) -->
  <div class="card" id="rates-card" style="display:none">
    <div class="rates-toggle" id="rates-toggle" onclick="toggleRates()">
      <span>⚙️ Customize Rates</span>
      <span class="arrow">▼</span>
    </div>
    <div class="rates-body" id="rates-body">
      <div class="row-2" style="margin-top:0">
        <div class="field rate-field">
          <label>Talent Base ($)</label>
          <div class="inp-prefix"><span class="pre">$</span><input class="inp" type="number" id="r-talent-base" min="0" oninput="autoUpdateClientRates()"></div>
        </div>
        <div class="field rate-field">
          <label>Client Base ($)</label>
          <div class="inp-prefix"><span class="pre">$</span><input class="inp" type="number" id="r-client-base" min="0" oninput="updatePricingPreview()"></div>
        </div>
      </div>
      <div class="row-3">
        <div class="field rate-field">
          <label>+Hr Talent</label>
          <div class="inp-prefix"><span class="pre">$</span><input class="inp" type="number" id="r-extra-talent" min="0" value="150" oninput="autoUpdateClientRates()"></div>
        </div>
        <div class="field rate-field">
          <label>+Hr Client</label>
          <div class="inp-prefix"><span class="pre">$</span><input class="inp" type="number" id="r-extra-client" min="0" value="180" oninput="updatePricingPreview()"></div>
        </div>
        <div class="field rate-field">
          <label>Travel Fee</label>
          <div class="inp-prefix"><span class="pre">$</span><input class="inp" type="number" id="r-travel" min="0" value="0" oninput="updatePricingPreview()"></div>
        </div>
      </div>
      <hr>
      <div class="row-2">
        <div class="field rate-field">
          <label>Deposit %</label>
          <input class="inp" type="number" id="r-deposit-pct" min="0" max="100" value="50" oninput="updatePricingPreview()">
        </div>
        <div class="field rate-field">
          <label>Booking Fee %</label>
          <input class="inp" type="number" id="r-booking-fee" min="0" max="100" value="20" oninput="autoUpdateClientRates()">
        </div>
      </div>
    </div>
  </div>

  <!-- NOTES -->
  <div class="card">
    <div class="card-title">Notes (optional)</div>
    <textarea class="inp" id="notes" placeholder="Special requests, context..." style="height:75px;resize:none"></textarea>
  </div>

  <button class="btn btn-gold" onclick="generateQuote()">Generate Quote →</button>

</div><!-- /form-section -->

<!-- ═══════ OUTPUT ═══════ -->
<div id="output-section">
  <div class="card">
    <div class="card-title">💰 Final Pricing</div>
    <div id="output-pricing"></div>
  </div>
  <div class="card">
    <div class="card-title">📧 Email Draft</div>
    <div class="email-box" id="email-draft"></div>
    <button class="btn btn-copy" id="copy-btn" onclick="copyEmail()">Copy Email</button>
  </div>
  <div class="reset-link"><a href="#" onclick="resetForm()">← New quote</a></div>
</div>

<script>

//  STATE / COUNTER

let performers=1, duration=2;
let selectedState='', selectedCity='';
let calYear, calMonth, selectedDate=null;
let ddFocusIdx = { state:-1, city:-1 };

function changePerformers(d){ performers=Math.max(1,Math.min(10,performers+d)); document.getElementById('performer-count').textContent=performers; updatePricingPreview(); }
function changeDuration(d){ duration=Math.max(0.5,Math.min(12,parseFloat((duration+d).toFixed(1)))); document.getElementById('duration-val').textContent=duration; updatePricingPreview(); }

// ═══════════════════════════════════════
//  DROPDOWN: STATE
// ═══════════════════════════════════════
function openDropdown(which){
  closeAllDropdowns();
  document.getElementById('backdrop').classList.add('show');
  filterStates();
  if(which==='city') filterCities();
  setTimeout(()=>{ document.getElementById(which+'-dropdown').classList.add('open'); },10);
}

function closeAllDropdowns(){
  document.querySelectorAll('.dropdown').forEach(d=>d.classList.remove('open'));
  document.getElementById('backdrop').classList.remove('show');
  ddFocusIdx={state:-1,city:-1};
}

function filterStates(){
  const q=document.getElementById('state-input').value.toLowerCase().trim();
  const dd=document.getElementById('state-dropdown');
  const matches=STATES.filter(s=>s.toLowerCase().includes(q));
  dd.innerHTML = matches.length
    ? matches.map(s=>`<div class="dropdown-item" onclick="selectState('${s}')">${highlight(s,q)}</div>`).join('')
    : `<div class="dropdown-empty">No results</div>`;
  dd.classList.add('open');
  document.getElementById('state-clear').classList.toggle('show', q.length>0);
}

function selectState(state){
  selectedState=state;
  document.getElementById('state-input').value=state;
  document.getElementById('state-input').classList.add('filled');
  document.getElementById('state-clear').classList.add('show');
  closeAllDropdowns();
  // Reset city
  selectedCity='';
  document.getElementById('city-input').value='';
  document.getElementById('city-input').classList.remove('filled');
  document.getElementById('city-clear').classList.remove('show');
}

// ═══════════════════════════════════════
//  DROPDOWN: CITY
// ═══════════════════════════════════════
function filterCities(){
  const q=document.getElementById('city-input').value.toLowerCase().trim();
  const dd=document.getElementById('city-dropdown');
  const pool = selectedState && CITIES[selectedState] ? CITIES[selectedState] : Object.values(CITIES).flat();
  const matches = q ? pool.filter(c=>c.toLowerCase().includes(q)) : (selectedState && CITIES[selectedState] ? CITIES[selectedState] : []);
  dd.innerHTML = matches.length
    ? matches.slice(0,12).map(c=>`<div class="dropdown-item" onclick="selectCity('${c.replace(/'/g,"\\'")}')"><span>${highlight(c,q)}</span></div>`).join('')
    : `<div class="dropdown-empty">${q?'No results':'Select a state first'}</div>`;
  dd.classList.add('open');
  document.getElementById('city-clear').classList.toggle('show', document.getElementById('city-input').value.length>0);
}

function selectCity(city){
  selectedCity=city;
  document.getElementById('city-input').value=city;
  document.getElementById('city-input').classList.add('filled');
  document.getElementById('city-clear').classList.add('show');
  closeAllDropdowns();
}

function clearField(which){
  document.getElementById(which+'-input').value='';
  document.getElementById(which+'-input').classList.remove('filled');
  document.getElementById(which+'-clear').classList.remove('show');
  if(which==='state'){ selectedState=''; selectedCity=''; document.getElementById('city-input').value=''; document.getElementById('city-input').classList.remove('filled'); }
  if(which==='city') selectedCity='';
}

function highlight(text, q){
  if(!q) return text;
  return text.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<strong>$1</strong>');
}

// keyboard nav
function ddKeydown(e,which){
  const dd=document.getElementById(which+'-dropdown');
  const items=dd.querySelectorAll('.dropdown-item');
  if(!items.length) return;
  if(e.key==='ArrowDown'){ ddFocusIdx[which]=Math.min(ddFocusIdx[which]+1,items.length-1); }
  else if(e.key==='ArrowUp'){ ddFocusIdx[which]=Math.max(ddFocusIdx[which]-1,0); }
  else if(e.key==='Enter' && ddFocusIdx[which]>=0){ items[ddFocusIdx[which]].click(); return; }
  else if(e.key==='Escape'){ closeAllDropdowns(); return; }
  items.forEach((el,i)=>el.classList.toggle('focused',i===ddFocusIdx[which]));
  if(ddFocusIdx[which]>=0) items[ddFocusIdx[which]].scrollIntoView({block:'nearest'});
}

// ═══════════════════════════════════════
//  CALENDAR
// ═══════════════════════════════════════
function openCalendar(){
  const now=new Date();
  calYear=selectedDate?selectedDate.getFullYear():now.getFullYear();
  calMonth=selectedDate?selectedDate.getMonth():now.getMonth();
  renderCalendar();
  document.getElementById('cal-overlay').classList.add('open');
}
function closeCalendar(){ document.getElementById('cal-overlay').classList.remove('open'); }
function calOverlayClick(e){ if(e.target===document.getElementById('cal-overlay')) closeCalendar(); }
function calNav(d){ calMonth+=d; if(calMonth>11){calMonth=0;calYear++;} if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); }

function renderCalendar(){
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-month-label').textContent=`${months[calMonth]} ${calYear}`;
  const labelsEl=document.getElementById('cal-day-labels');
  labelsEl.innerHTML=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cal-day-label">${d}</div>`).join('');
  const gridEl=document.getElementById('cal-grid');
  const today=new Date(); today.setHours(0,0,0,0);
  const first=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const daysInPrev=new Date(calYear,calMonth,0).getDate();
  let html='';
  for(let i=0;i<first;i++){ html+=`<div class="cal-day other">${daysInPrev-first+1+i}</div>`; }
  for(let d=1;d<=daysInMonth;d++){
    const date=new Date(calYear,calMonth,d);
    const isPast=date<today;
    const isToday=date.getTime()===today.getTime();
    const isSel=selectedDate&&date.getTime()===selectedDate.getTime();
    let cls='cal-day';
    if(isPast) cls+=' past';
    else if(isSel) cls+=' selected';
    else if(isToday) cls+=' today';
    const handler=isPast?'':`onclick="selectDate(${calYear},${calMonth},${d})"`;
    html+=`<div class="${cls}" ${handler}>${d}</div>`;
  }
  gridEl.innerHTML=html;
}

function selectDate(y,m,d){
  selectedDate=new Date(y,m,d);
  document.getElementById('event-date').value=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const label=selectedDate.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
  const el=document.getElementById('date-display-text');
  el.textContent=label; el.classList.add('set');
  renderCalendar();
  setTimeout(closeCalendar,180);
}

function fillRates(type,local){
  if(!DEFAULTS[type]) return;
  const loc=local?'local':'oos';

  document.getElementById('r-talent-base').value=d.talent||'';
  document.getElementById('r-client-base').value=d.client||'';

}

function toggleRates(){

// ═══════════════════════════════════════
//  PRICING
// ═══════════════════════════════════════
function vn(id){ return parseFloat(document.getElementById(id).value)||0; }
function fmt(n){ return '$'+Number(n).toLocaleString(); }

function getAddons(){
  return [...document.querySelectorAll('.addon-row')].map(r=>({
    label:r.querySelector('.addon-label').value.trim()||'Add-on',
    amount:parseFloat(r.querySelector('.addon-amount').value)||0
  })).filter(a=>a.amount>0);
}

// Auto-update client rate fields when talent rate or fee % changes
function autoUpdateClientRates(){
  const talentBase=vn('r-talent-base');
  const extraTalent=vn('r-extra-talent');
  const fee=vn('r-booking-fee')/100;
  if(talentBase>0) document.getElementById('r-client-base').value=Math.round(talentBase*(1+fee));
  document.getElementById('r-extra-client').value=Math.round(extraTalent*(1+fee));
  updatePricingPreview();
}

function calcPricing(){
  const talentBase=vn('r-talent-base');
  if(!talentBase) return null;
  const feePct=vn('r-booking-fee')/100;
  const extraTalentHr=vn('r-extra-talent');
  const travel=vn('r-travel');
  const depositPct=vn('r-deposit-pct')/100;
  const extraHrs=Math.max(0,duration-2);
  // Talent totals
  const extraTalent=Math.round(extraHrs*extraTalentHr);
  const perTalent=talentBase+extraTalent;
  // Client = talent total + fee% on top of the whole talent total
  const perClient=Math.round(perTalent*(1+feePct));
  const yourCutPer=perClient-perTalent;
  const addons=getAddons();
  const addonTotal=addons.reduce((s,a)=>s+a.amount,0);
  const subtotal=perClient*performers;
  const total=subtotal+travel+addonTotal;
  const deposit=Math.round(total*depositPct);
  return { talentBase,feePct,extraHrs,extraTalent,extraTalentHr,perTalent,perClient,yourCutPer,
           travel,addons,addonTotal,subtotal,total,deposit,balance:total-deposit,depositPct };
}

function buildPricingHTML(p){
  let h='';
  // Per-performer breakdown
  h+=`<div class="price-row"><span class="pl">Talent base (per performer)</span><span class="pv">${fmt(p.talentBase)}</span></div>`;
  if(p.extraHrs>0) h+=`<div class="price-row"><span class="pl">+${p.extraHrs}hr × ${fmt(p.extraTalentHr)} talent</span><span class="pv">+${fmt(p.extraTalent)}</span></div>`;
  h+=`<div class="price-row"><span class="pl">Talent total (per performer)</span><span class="pv">${fmt(p.perTalent)}</span></div>`;
  h+=`<div class="price-row"><span class="pl">+ ${Math.round(p.feePct*100)}% booking fee</span><span class="pv">+${fmt(p.yourCutPer)}</span></div>`;
  h+=`<div class="price-row"><span class="pl">Client rate (per performer)</span><span class="pv" style="color:#A8D4F5">${fmt(p.perClient)}</span></div>`;
  if(performers>1) h+=`<div class="price-row"><span class="pl">${performers} performers × ${fmt(p.perClient)}</span><span class="pv">${fmt(p.subtotal)}</span></div>`;
  if(p.travel>0) h+=`<div class="price-row"><span class="pl">Travel fee</span><span class="pv">+${fmt(p.travel)}</span></div>`;
  p.addons.forEach(a=>{ h+=`<div class="price-row"><span class="pl">${a.label}</span><span class="pv">+${fmt(a.amount)}</span></div>`; });
  h+=`<div class="price-row total"><span class="pl">Client Total</span><span class="pv">${fmt(p.total)}</span></div>`;
  h+=`<div class="price-row cut"><span class="pl">⚡ Your booking fee (${Math.round(p.feePct*100)}%)</span><span class="pv">${fmt(p.yourCutPer*performers)}</span></div>`;
  h+=`<div class="price-row dep"><span class="pl">Deposit (${Math.round(p.depositPct*100)}%)</span><span class="pv">${fmt(p.deposit)}</span></div>`;
  h+=`<div class="price-row dep"><span class="pl">Balance (day-of)</span><span class="pv">${fmt(p.balance)}</span></div>`;
  h+=`<div class="price-row int"><span class="pl">Talent payout</span><span class="pv">${fmt(p.perTalent*performers)}</span></div>`;
  return h;
}

function updatePricingPreview(){
  const p=calcPricing();
  const el=document.getElementById('pricing-preview');
  if(!p){ el.style.display='none'; return; }
  el.style.display='block';
  document.getElementById('pricing-rows').innerHTML=buildPricingHTML(p);
}

function addAddon(){
  const list=document.getElementById('addon-list');
  const row=document.createElement('div');
  row.className='addon-row';
  row.innerHTML=`<input class="inp" type="text" class="addon-label" placeholder="e.g. Costume fee" oninput="updatePricingPreview()"><div class="inp-prefix"><span class="pre">$</span><input class="inp addon-amount" type="number" placeholder="0" min="0" style="padding-left:24px" oninput="updatePricingPreview()"></div><button class="addon-remove" onclick="this.closest('.addon-row').remove();updatePricingPreview()">×</button>`;
  list.appendChild(row);
}

//  GENERATE
// ═══════════════════════════════════════
function generateQuote(){
  const name=document.getElementById('client-name').value.trim();
  const city=document.getElementById('city-input').value.trim()||selectedCity;
  const state=document.getElementById('state-input').value.trim()||selectedState;
  const evtType=document.getElementById('event-type').value.trim();
  const evtDate=document.getElementById('event-date').value;
  const entType=document.getElementById('ent-type').value;
  const notes=document.getElementById('notes').value.trim();
  const local=document.querySelector('input[name="location"]:checked').value==='local';
  if(!name||!entType){ alert('Fill in client name and entertainment type.'); return; }
  const p=calcPricing();
  if(!p||!p.clientBase){ alert('Select an entertainment type so rates can be calculated.'); return; }
  let entLabel=TYPE_LABELS[entType]||'Entertainment';
  if(entType==='custom'){ const cl=document.getElementById('custom-type-label').value.trim(); if(cl) entLabel=cl; }
  const dateStr=evtDate?new Date(evtDate+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}):'[DATE TBD]';
  const firstName=(name.match(/^(\S+)/)||[,'there'])[1];
  const locationStr=[city,state].filter(Boolean).join(', ');
  const performerStr=performers===1?'1 performer':`${performers} performers`;
  const durationStr=duration===1?'1 hour':`${duration} hours`;
  let email=`Hi ${firstName},\n\nThanks for reaching out to OnlyDwarfs Entertainment!\n\n`;
  if(evtType) email+=`We'd love to help make your ${evtType} unforgettable${locationStr?' in '+locationStr:''}.\n\n`;
  email+=`Here's what we've put together:\n\n`;
  email+=`• Entertainment: ${entLabel}\n• Performers: ${performerStr}\n• Duration: ${durationStr}\n• Date: ${dateStr}\n`;
  if(!local) email+=`• Travel: Out of state (included)\n`;
  p.addons.forEach(a=>{ email+=`• ${a.label}: ${fmt(a.amount)}\n`; });
  email+=`\nTotal: ${fmt(p.total)}\nTo confirm, we require a ${Math.round(p.depositPct*100)}% deposit of ${fmt(p.deposit)} upfront, with the remaining ${fmt(p.balance)} due before the performer arrives.\n\n`;
  if(notes) email+=`${notes}\n\n`;
  email+=`Reply here and we'll get everything locked in!\n\nRyder Warbrick\nOnlyDwarfs Entertainment\nryderwarbrick@onlydwarfs.com`;
  document.getElementById('output-pricing').innerHTML=buildPricingHTML(p);
  document.getElementById('email-draft').textContent=email;
  document.getElementById('form-section').style.display='none';
  document.getElementById('output-section').style.display='block';
  window.scrollTo(0,0);
  window._generatedEmail=email;
}

function copyEmail(){
  navigator.clipboard.writeText(window._generatedEmail||'').then(()=>{
    const btn=document.getElementById('copy-btn');
    btn.textContent='✓ Copied!'; btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent='Copy Email'; btn.classList.remove('copied'); },2000);
  });
}
function resetForm(){
  document.getElementById('form-section').style.display='block';
  document.getElementById('output-section').style.display='none';
  window.scrollTo(0,0);
}
