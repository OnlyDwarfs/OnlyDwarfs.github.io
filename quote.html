<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quote Generator — OnlyDwarfs</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0D0D1A; color: #EFEFEF;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh; padding: 20px 16px 40px;
  }
  .header { text-align: center; margin-bottom: 28px; }
  .header h1 { font-size: 18px; font-weight: 700; color: #C9A84C; letter-spacing: 2px; text-transform: uppercase; }
  .header p { font-size: 12px; color: #666; margin-top: 4px; }

  .card { background: #161628; border-radius: 14px; padding: 20px; margin-bottom: 16px; border: 1px solid #222240; }
  .card-title { font-size: 11px; font-weight: 700; color: #C9A84C; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
  .card-title .auto-badge { font-size: 9px; background: #C9A84C22; color: #C9A84C; padding: 2px 7px; border-radius: 99px; letter-spacing: 0.5px; font-weight: 600; }

  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  label { display: block; font-size: 11px; color: #666; margin-bottom: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; }

  input[type="text"], input[type="date"], input[type="number"], select, textarea {
    width: 100%; background: #0D0D1A; border: 1px solid #2A2A4A; border-radius: 8px;
    color: #EFEFEF; font-size: 15px; padding: 11px 13px; outline: none;
    transition: border-color 0.2s; -webkit-appearance: none; font-family: inherit;
  }
  input:focus, select:focus, textarea:focus { border-color: #C9A84C; }
  /* Editable rate fields glow slightly to show they're adjustable */
  .rate-field input { border-color: #2A3A4A; color: #A8D4F5; }
  .rate-field input:focus { border-color: #C9A84C; color: #EFEFEF; }
  .rate-field label { color: #4A7A9A; }

  select option { background: #161628; }
  textarea { resize: none; height: 80px; }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

  /* Location toggle */
  .toggle-group { display: flex; background: #0D0D1A; border: 1px solid #2A2A4A; border-radius: 8px; overflow: hidden; }
  .toggle-group input[type="radio"] { display: none; }
  .toggle-group label { flex: 1; text-align: center; padding: 11px 8px; font-size: 13px; font-weight: 600; color: #666; cursor: pointer; margin: 0; letter-spacing: 0; text-transform: none; transition: all 0.2s; }
  .toggle-group input[type="radio"]:checked + label { background: #C9A84C; color: #0D0D1A; }

  /* Counter */
  .counter { display: flex; align-items: center; background: #0D0D1A; border: 1px solid #2A2A4A; border-radius: 8px; overflow: hidden; }
  .counter button { background: none; border: none; color: #C9A84C; font-size: 22px; font-weight: 700; padding: 8px 16px; cursor: pointer; line-height: 1; flex-shrink: 0; }
  .counter-val { flex: 1; text-align: center; font-size: 18px; font-weight: 700; color: #EFEFEF; }

  /* Input with prefix $ */
  .input-prefix { position: relative; }
  .input-prefix span { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: #666; font-size: 15px; pointer-events: none; }
  .input-prefix input { padding-left: 24px; }

  /* Add-ons */
  .addon-row { display: grid; grid-template-columns: 1fr 110px 36px; gap: 8px; align-items: center; margin-bottom: 8px; }
  .addon-remove { background: #2A1A1A; border: 1px solid #4A2A2A; border-radius: 8px; color: #E74C3C; font-size: 18px; font-weight: 700; cursor: pointer; height: 40px; display: flex; align-items: center; justify-content: center; }
  .btn-add-addon { background: none; border: 1px dashed #2A2A4A; border-radius: 8px; color: #555; font-size: 13px; padding: 10px; width: 100%; cursor: pointer; margin-top: 4px; transition: all 0.2s; }
  .btn-add-addon:active { border-color: #C9A84C44; color: #C9A84C; }

  /* Divider */
  hr { border: none; border-top: 1px solid #1A1A30; margin: 14px 0; }

  /* Pricing */
  #pricing-preview { display: none; }
  .price-row { display: flex; justify-content: space-between; align-items: baseline; padding: 8px 0; border-bottom: 1px solid #1A1A30; font-size: 14px; gap: 8px; }
  .price-row:last-child { border-bottom: none; padding-bottom: 0; }
  .price-row .pl { color: #777; flex: 1; }
  .price-row .pv { font-weight: 700; color: #EFEFEF; white-space: nowrap; }
  .price-row.total { padding-top: 12px; }
  .price-row.total .pl { color: #EFEFEF; font-weight: 700; font-size: 15px; }
  .price-row.total .pv { color: #C9A84C; font-size: 20px; }
  .price-row.deposit .pv { color: #9B59B6; }
  .price-row.internal .pl { color: #444; font-size: 12px; }
  .price-row.internal .pv { color: #444; font-size: 12px; font-weight: 500; }

  /* Buttons */
  .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
  .btn:active { opacity: 0.8; }
  .btn-gold { background: #C9A84C; color: #0D0D1A; margin-bottom: 16px; }
  .btn-copy { background: #1A2A3A; color: #EFEFEF; border: 1px solid #2A3A4A; margin-top: 12px; }
  .btn-copy.copied { background: #1A4A2A; border-color: #27AE60; color: #27AE60; }

  .warning { background: #2A1A0A; border-left: 3px solid #C9A84C; border-radius: 8px; padding: 12px 14px; font-size: 12px; color: #C9A84C88; margin-bottom: 16px; line-height: 1.5; }
  .email-box { background: #0D0D1A; border: 1px solid #2A2A4A; border-radius: 8px; padding: 14px; font-size: 13px; line-height: 1.7; color: #EFEFEF; white-space: pre-wrap; word-break: break-word; }
  .reset-link { text-align: center; margin-top: 16px; }
  .reset-link a { color: #444; font-size: 13px; text-decoration: none; }

  #output-section { display: none; }

  /* Rates section hidden until type selected */
  #rates-card { display: none; }
</style>
</head>
<body>

<div class="header">
  <h1>⚡ Quote Generator</h1>
  <p>OnlyDwarfs Entertainment</p>
</div>

<div id="form-section">

  <div class="warning">⚠️ Check talent roster for nearby performers before sending.</div>

  <!-- CLIENT -->
  <div class="card">
    <div class="card-title">Client Info</div>
    <div class="field">
      <label>Client Name</label>
      <input type="text" id="client-name" placeholder="John Smith" autocomplete="off">
    </div>
    <div class="row-2">
      <div class="field">
        <label>City</label>
        <input type="text" id="client-city" placeholder="Las Vegas" autocomplete="off">
      </div>
      <div class="field">
        <label>State</label>
        <input type="text" id="client-state" placeholder="NV" autocomplete="off" maxlength="20">
      </div>
    </div>
    <div class="field">
      <label>Event Type</label>
      <input type="text" id="event-type" placeholder="Bachelor party, birthday, corporate..." autocomplete="off">
    </div>
    <div class="field">
      <label>Event Date</label>
      <input type="date" id="event-date">
    </div>
  </div>

  <!-- ENTERTAINMENT -->
  <div class="card">
    <div class="card-title">Entertainment</div>

    <div class="field">
      <label>Type</label>
      <select id="ent-type" onchange="onEntTypeChange()">
        <option value="">— Select —</option>
        <optgroup label="Standard">
          <option value="character">Character / Party Appearance</option>
          <option value="female">Female Stripper / Adult Entertainment</option>
          <option value="male">Male Stripper / Adult Entertainment</option>
        </optgroup>
        <optgroup label="Specialty">
          <option value="tossing">Dwarf Tossing</option>
          <option value="promo">Promotional Appearance</option>
          <option value="corporate">Corporate Event</option>
          <option value="film">Film / Commercial</option>
          <option value="custom">Custom / Other</option>
        </optgroup>
      </select>
    </div>

    <div class="field" id="custom-label-field" style="display:none">
      <label>Custom Type Label</label>
      <input type="text" id="custom-type-label" placeholder="e.g. Stilt Walker, Magician..." autocomplete="off">
    </div>

    <div class="field">
      <label>Location</label>
      <div class="toggle-group">
        <input type="radio" name="location" id="loc-local" value="local" checked onchange="onLocationChange()">
        <label for="loc-local">In-State (Local)</label>
        <input type="radio" name="location" id="loc-oos" value="oos" onchange="onLocationChange()">
        <label for="loc-oos">Out of State</label>
      </div>
    </div>

    <div class="row-2">
      <div class="field">
        <label>Performers</label>
        <div class="counter">
          <button onclick="changePerformers(-1)">−</button>
          <div class="counter-val" id="performer-count">1</div>
          <button onclick="changePerformers(1)">+</button>
        </div>
      </div>
      <div class="field">
        <label>Duration (hrs)</label>
        <div class="counter">
          <button onclick="changeDuration(-0.5)">−</button>
          <div class="counter-val" id="duration-val">2</div>
          <button onclick="changeDuration(0.5)">+</button>
        </div>
      </div>
    </div>
  </div>

  <!-- RATES — auto-filled, all editable -->
  <div class="card" id="rates-card">
    <div class="card-title">
      Rates
      <span class="auto-badge">auto-filled · tap to edit</span>
    </div>

    <div class="row-2">
      <div class="field rate-field">
        <label>Talent Base Rate</label>
        <div class="input-prefix">
          <span>$</span>
          <input type="number" id="r-talent-base" min="0" oninput="updatePricingPreview()">
        </div>
      </div>
      <div class="field rate-field">
        <label>Client Base Rate</label>
        <div class="input-prefix">
          <span>$</span>
          <input type="number" id="r-client-base" min="0" oninput="updatePricingPreview()">
        </div>
      </div>
    </div>

    <div class="row-3">
      <div class="field rate-field">
        <label>Extra Hr (Talent)</label>
        <div class="input-prefix">
          <span>$</span>
          <input type="number" id="r-extra-talent" min="0" value="150" oninput="updatePricingPreview()">
        </div>
      </div>
      <div class="field rate-field">
        <label>Extra Hr (Client)</label>
        <div class="input-prefix">
          <span>$</span>
          <input type="number" id="r-extra-client" min="0" value="180" oninput="updatePricingPreview()">
        </div>
      </div>
      <div class="field rate-field">
        <label>Travel Fee</label>
        <div class="input-prefix">
          <span>$</span>
          <input type="number" id="r-travel" min="0" value="0" oninput="updatePricingPreview()">
        </div>
      </div>
    </div>

    <hr>

    <div class="row-2">
      <div class="field rate-field">
        <label>Deposit %</label>
        <input type="number" id="r-deposit-pct" min="0" max="100" value="50" oninput="updatePricingPreview()" style="color:#9B59B6">
      </div>
      <div class="field rate-field">
        <label>Booking Fee %</label>
        <input type="number" id="r-booking-fee" min="0" max="100" value="20" oninput="updatePricingPreview()" style="color:#9B59B6">
      </div>
    </div>
  </div>

  <!-- ADD-ONS -->
  <div class="card">
    <div class="card-title">Add-Ons & Extra Charges</div>
    <div id="addon-list"></div>
    <button class="btn-add-addon" onclick="addAddon()">+ Add line item</button>
  </div>

  <!-- PRICING PREVIEW -->
  <div class="card" id="pricing-preview">
    <div class="card-title">💰 Pricing Preview</div>
    <div id="pricing-rows"></div>
  </div>

  <!-- NOTES -->
  <div class="card">
    <div class="card-title">Notes (optional)</div>
    <textarea id="notes" placeholder="Special requests, context for the email..."></textarea>
  </div>

  <button class="btn btn-gold" onclick="generateQuote()">Generate Quote →</button>

</div>

<!-- OUTPUT -->
<div id="output-section">
  <div class="card">
    <div class="card-title">💰 Final Pricing</div>
    <div id="output-pricing"></div>
  </div>
  <div class="card">
    <div class="card-title">📧 Email Draft</div>
    <div class="email-box" id="email-draft"></div>
    <button class="btn btn-copy" id="copy-btn" onclick="copyEmail()">Copy Email</button>
  </div>
  <div class="reset-link"><a href="#" onclick="resetForm()">← New quote</a></div>
</div>

<script>
  let performers = 1;
  let duration = 2;

  const DEFAULTS = {
    character: { local: { talent: 500,  client: 600,  travel: 0   }, oos: { talent: 1000, client: 1200, travel: 200 } },
    female:    { local: { talent: 1000, client: 1200, travel: 0   }, oos: { talent: 1000, client: 1400, travel: 200 } },
    male:      { local: { talent: 800,  client: 960,  travel: 0   }, oos: { talent: 800,  client: 1160, travel: 200 } },
    tossing:   { local: { talent: 600,  client: 720,  travel: 0   }, oos: { talent: 1000, client: 1200, travel: 200 } },
    promo:     { local: { talent: 500,  client: 600,  travel: 0   }, oos: { talent: 1000, client: 1200, travel: 200 } },
    corporate: { local: { talent: 800,  client: 960,  travel: 0   }, oos: { talent: 1200, client: 1440, travel: 200 } },
    film:      { local: { talent: 1000, client: 1200, travel: 0   }, oos: { talent: 1500, client: 1800, travel: 200 } },
    custom:    { local: { talent: 0,    client: 0,    travel: 0   }, oos: { talent: 0,    client: 0,    travel: 200 } },
  };

  const TYPE_LABELS = {
    character: 'Character / Party Appearance', female: 'Female Entertainer',
    male: 'Male Entertainer', tossing: 'Dwarf Tossing', promo: 'Promotional Appearance',
    corporate: 'Corporate Event', film: 'Film / Commercial', custom: 'Custom Entertainment',
  };

  function v(id) { return parseFloat(document.getElementById(id).value) || 0; }
  function fmt(n) { return '$' + Number(n).toLocaleString(); }

  function changePerformers(d) {
    performers = Math.max(1, Math.min(10, performers + d));
    document.getElementById('performer-count').textContent = performers;
    updatePricingPreview();
  }
  function changeDuration(d) {
    duration = Math.max(0.5, Math.min(12, parseFloat((duration + d).toFixed(1))));
    document.getElementById('duration-val').textContent = duration;
    updatePricingPreview();
  }

  function fillRates(type, local) {
    if (!DEFAULTS[type]) return;
    const loc = local ? 'local' : 'oos';
    const d = DEFAULTS[type][loc];
    document.getElementById('r-talent-base').value = d.talent || '';
    document.getElementById('r-client-base').value = d.client || '';
    document.getElementById('r-travel').value = d.travel || 0;
  }

  function onEntTypeChange() {
    const type = document.getElementById('ent-type').value;
    const local = document.querySelector('input[name="location"]:checked').value === 'local';
    document.getElementById('custom-label-field').style.display = type === 'custom' ? 'block' : 'none';
    if (type) {
      document.getElementById('rates-card').style.display = 'block';
      fillRates(type, local);
    } else {
      document.getElementById('rates-card').style.display = 'none';
    }
    updatePricingPreview();
  }

  function onLocationChange() {
    const type = document.getElementById('ent-type').value;
    const local = document.querySelector('input[name="location"]:checked').value === 'local';
    if (type) fillRates(type, local);
    updatePricingPreview();
  }

  function getAddons() {
    return [...document.querySelectorAll('.addon-row')].map(row => ({
      label: row.querySelector('.addon-label').value.trim() || 'Add-on',
      amount: parseFloat(row.querySelector('.addon-amount').value) || 0,
    })).filter(a => a.amount > 0 || a.label !== 'Add-on');
  }

  function calcPricing() {
    const talentBase = v('r-talent-base');
    const clientBase = v('r-client-base');
    const extraTalentHr = v('r-extra-talent');
    const extraClientHr = v('r-extra-client');
    const travel = v('r-travel');
    const depositPct = v('r-deposit-pct') / 100;
    const bookingFeePct = v('r-booking-fee') / 100;

    if (!clientBase) return null;

    const extraHrs = Math.max(0, duration - 2);
    const extraTalentCost = Math.round(extraHrs * extraTalentHr);
    const extraClientCost = Math.round(extraHrs * extraClientHr);

    const perTalent = talentBase + extraTalentCost;
    const perClient = clientBase + extraClientCost;

    const addons = getAddons();
    const addonTotal = addons.reduce((s, a) => s + a.amount, 0);

    const subtotal = perClient * performers;
    const total = subtotal + travel + addonTotal;
    const deposit = Math.round(total * depositPct);
    const balance = total - deposit;
    const yourCut = Math.round(total * bookingFeePct) * performers;
    const talentPayout = perTalent * performers;

    return { talentBase, clientBase, extraHrs, extraTalentCost, extraClientCost,
             perTalent, perClient, addons, addonTotal, subtotal, travel,
             total, deposit, balance, yourCut, talentPayout, depositPct, bookingFeePct };
  }

  function buildPricingHTML(p) {
    let html = '';
    html += `<div class="price-row"><span class="pl">Base rate (per performer)</span><span class="pv">${fmt(p.clientBase)}</span></div>`;
    if (p.extraHrs > 0) html += `<div class="price-row"><span class="pl">+${p.extraHrs}hr × ${fmt(v('r-extra-client'))}/hr</span><span class="pv">+${fmt(p.extraClientCost)}</span></div>`;
    if (performers > 1) html += `<div class="price-row"><span class="pl">${performers} performers × ${fmt(p.perClient)}</span><span class="pv">${fmt(p.subtotal)}</span></div>`;
    if (p.travel > 0) html += `<div class="price-row"><span class="pl">Travel fee</span><span class="pv">+${fmt(p.travel)}</span></div>`;
    p.addons.forEach(a => { html += `<div class="price-row"><span class="pl">${a.label}</span><span class="pv">+${fmt(a.amount)}</span></div>`; });
    html += `<div class="price-row total"><span class="pl">Client Total</span><span class="pv">${fmt(p.total)}</span></div>`;
    html += `<div class="price-row deposit"><span class="pl">Deposit (${Math.round(p.depositPct*100)}% upfront)</span><span class="pv">${fmt(p.deposit)}</span></div>`;
    html += `<div class="price-row deposit"><span class="pl">Balance (due day-of)</span><span class="pv">${fmt(p.balance)}</span></div>`;
    html += `<div class="price-row internal"><span class="pl">Talent payout (internal)</span><span class="pv">${fmt(p.talentPayout)}</span></div>`;
    html += `<div class="price-row internal"><span class="pl">Your booking fee (${Math.round(p.bookingFeePct*100)}%)</span><span class="pv">${fmt(p.yourCut)}</span></div>`;
    return html;
  }

  function updatePricingPreview() {
    const p = calcPricing();
    const preview = document.getElementById('pricing-preview');
    if (!p) { preview.style.display = 'none'; return; }
    preview.style.display = 'block';
    document.getElementById('pricing-rows').innerHTML = buildPricingHTML(p);
  }

  function addAddon() {
    const list = document.getElementById('addon-list');
    const row = document.createElement('div');
    row.className = 'addon-row';
    row.innerHTML = `
      <input type="text" class="addon-label" placeholder="Costume fee, hotel..." oninput="updatePricingPreview()">
      <div class="input-prefix"><span>$</span><input type="number" class="addon-amount" placeholder="0" min="0" style="padding-left:24px" oninput="updatePricingPreview()"></div>
      <button class="addon-remove" onclick="this.closest('.addon-row').remove();updatePricingPreview()">×</button>`;
    list.appendChild(row);
  }

  function generateQuote() {
    const name    = document.getElementById('client-name').value.trim();
    const city    = document.getElementById('client-city').value.trim();
    const state   = document.getElementById('client-state').value.trim();
    const evtType = document.getElementById('event-type').value.trim();
    const evtDate = document.getElementById('event-date').value;
    const entType = document.getElementById('ent-type').value;
    const notes   = document.getElementById('notes').value.trim();
    const local   = document.querySelector('input[name="location"]:checked').value === 'local';

    if (!name || !entType) { alert('Fill in client name and entertainment type.'); return; }
    const p = calcPricing();
    if (!p || !p.clientBase) { alert('Enter a client rate in the Rates section.'); return; }

    let entLabel = TYPE_LABELS[entType] || 'Entertainment';
    if (entType === 'custom') {
      const cl = document.getElementById('custom-type-label').value.trim();
      if (cl) entLabel = cl;
    }

    const dateStr = evtDate
      ? new Date(evtDate + 'T12:00:00').toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' })
      : '[DATE TBD]';

    const firstName = (name.match(/^(\S+)/) || [,'there'])[1];
    const locationStr = [city, state].filter(Boolean).join(', ');
    const performerStr = performers === 1 ? '1 performer' : `${performers} performers`;
    const durationStr = duration === 1 ? '1 hour' : `${duration} hours`;

    let email = `Hi ${firstName},\n\nThanks for reaching out to OnlyDwarfs Entertainment!\n\n`;
    if (evtType) email += `We'd love to help make your ${evtType} unforgettable${locationStr ? ' in ' + locationStr : ''}.\n\n`;
    email += `Here's what we've put together:\n\n`;
    email += `• Entertainment: ${entLabel}\n`;
    email += `• Performers: ${performerStr}\n`;
    email += `• Duration: ${durationStr}\n`;
    email += `• Date: ${dateStr}\n`;
    if (!local) email += `• Travel: Out of state (included)\n`;
    p.addons.forEach(a => { email += `• ${a.label}: ${fmt(a.amount)}\n`; });
    email += `\nTotal: ${fmt(p.total)}\n`;
    email += `To confirm your booking we require a ${Math.round(p.depositPct*100)}% deposit of ${fmt(p.deposit)} upfront, with the remaining ${fmt(p.balance)} due before the performer arrives.\n\n`;
    if (notes) email += `${notes}\n\n`;
    email += `Reply here and we'll get everything locked in!\n\n`;
    email += `Ryder Warbrick\nOnlyDwarfs Entertainment\nryderwarbrick@onlydwarfs.com`;

    document.getElementById('output-pricing').innerHTML = buildPricingHTML(p);
    document.getElementById('email-draft').textContent = email;
    document.getElementById('form-section').style.display = 'none';
    document.getElementById('output-section').style.display = 'block';
    window.scrollTo(0, 0);
    window._generatedEmail = email;
  }

  function copyEmail() {
    navigator.clipboard.writeText(window._generatedEmail || '').then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy Email'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function resetForm() {
    document.getElementById('form-section').style.display = 'block';
    document.getElementById('output-section').style.display = 'none';
    window.scrollTo(0, 0);
  }
</script>
</body>
</html>
