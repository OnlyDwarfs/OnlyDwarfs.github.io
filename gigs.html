<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Gig Postings</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #0d0d0d; color: #ccc; font-family: 'Inter', sans-serif; min-height: 100vh; }

  .page { padding: 28px 32px; max-width: 1100px; }
  .page-header { margin-bottom: 22px; }
  .breadcrumb { font-size: 11px; color: #444; margin-bottom: 6px; }
  .breadcrumb span { color: #888; }
  .page-title { font-size: 22px; font-weight: 900; color: #fff; }
  .page-sub { font-size: 13px; color: #555; margin-top: 4px; }

  .notice { border-radius: 7px; padding: 10px 14px; font-size: 12px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
  .notice-green { background: rgba(34,197,94,0.07); border: 1px solid rgba(34,197,94,0.18); color: #4ade80; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

  .abox { background: #1a1a1a; border: 1px solid #222; border-radius: 10px; padding: 18px; }
  .abox-title { font-size: 11px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 14px; }

  .form-row { margin-bottom: 12px; }
  .form-row label { display: block; font-size: 11px; font-weight: 600; color: #555; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em; }
  .form-row input, .form-row select, .form-row textarea {
    width: 100%; padding: 8px 11px;
    background: #111; border: 1px solid #2a2a2a;
    border-radius: 7px; font-size: 13px;
    font-family: inherit; color: #ccc;
    outline: none; transition: border 150ms;
  }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: #00AFF0; }
  .form-row textarea { height: 80px; resize: vertical; }

  .checkbox-row { display: flex; align-items: flex-start; gap: 8px; font-size: 12px; color: #666; margin-bottom: 14px; line-height: 1.5; }
  .checkbox-row input { width: auto; flex-shrink: 0; margin-top: 2px; }

  .btn { display: inline-block; padding: 8px 18px; border-radius: 7px; font-size: 12px; font-weight: 700; cursor: pointer; border: none; font-family: inherit; transition: opacity 120ms; }
  .btn:hover { opacity: 0.85; }
  .btn-blue { background: #00AFF0; color: #000; }
  .btn-dark { background: #222; border: 1px solid #333; color: #888; }
  .btn-green { background: #16a34a; color: #fff; }
  .btn-sm { padding: 4px 10px; font-size: 11px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #161616; text-align: left; padding: 8px 12px; border-bottom: 1px solid #222; font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.06em; }
  td { padding: 10px 12px; border-bottom: 1px solid #1a1a1a; color: #aaa; }
  tr:hover td { background: #141414; }

  .tag { display: inline-block; border-radius: 20px; padding: 2px 10px; font-size: 11px; font-weight: 600; }
  .tag-green  { background: rgba(34,197,94,0.1);  color: #4ade80;  border: 1px solid rgba(34,197,94,0.2);  }
  .tag-grey   { background: rgba(255,255,255,0.04); color: #555; border: 1px solid #2a2a2a; }
  .tag-red    { background: rgba(239,68,68,0.1);  color: #f87171; border: 1px solid rgba(239,68,68,0.2);  }
  .tag-blue   { background: rgba(0,175,240,0.1);  color: #00AFF0; border: 1px solid rgba(0,175,240,0.2);  }

  .right-col > * + * { margin-top: 14px; }
</style>
</head>
<body>
<div class="page">
  <div class="page-header">
    <div class="breadcrumb">Site Manager › <span>Open Gig Postings</span></div>
    <div class="page-title">Open Gig Postings</div>
    <div class="page-sub">Post a booking that needs talent. All performers get notified automatically via email + SMS.</div>
  </div>


  <div class="grid-2">
    <!-- POST FORM -->
    <div class="abox">
      <div class="abox-title">Post a New Open Gig</div>
      <div class="form-row"><label>Event Name</label><input type="text" placeholder="e.g. Corporate Event — NYC"></div>
      <div class="form-row"><label>Date</label><input type="date"></div>
      <div class="form-row"><label>Location</label><input type="text" placeholder="City, State"></div>
      <div class="form-row"><label>Pay Per Performer</label><input type="text" placeholder="e.g. $400"></div>
      <div class="form-row"><label>Performers Needed</label><input type="number" placeholder="e.g. 3" min="1"></div>
      <div class="form-row"><label>Details for Performers</label><textarea placeholder="Dress code, arrival time, what the gig involves..."></textarea></div>
      <div class="checkbox-row">
        <input type="checkbox" checked>
        Send email + SMS to all active performers when posted
      </div>
      <button class="btn btn-blue" onclick="void 0">Post Gig & Notify All Talent</button>
    </div>

    <!-- RESPONSES + PAST -->
    <div class="right-col">
      <div class="abox">
        <div class="abox-title">Responses — Most Recent Gig</div>
        <div style="padding: 24px 0; text-align: center; color: #3a3a3a; font-size: 12px;">No gigs posted yet.</div>
      </div>
      <div class="abox">
        <div class="abox-title">Past Postings</div>
        <div style="padding: 24px 0; text-align: center; color: #3a3a3a; font-size: 12px;">No past postings.</div>
      </div>
    </div>
  </div>
</div>
