<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Services — OnlyDwarfs | Dwarf Entertainment Booking</title>
  <meta name="description" content="Oompa Loompas, Elves, Leprechauns, Mini Elvis, Dwarf Tossing and more. OnlyDwarfs books 20+ types of dwarf entertainment for any event. Pricing from $600." />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="stylesheet" href="colors_and_type.css" />
  <link rel="stylesheet" href="site.css" />
  <style>
    /* ── PAGE HERO ── */
    .od-svc-hero {
      padding: 160px 40px 96px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .od-svc-hero-glow {
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 60% 60% at 50% 0%, rgba(0,175,240,0.18) 0%, transparent 70%);
    }
    .od-svc-hero-eyebrow {
      display: inline-block;
      font-size: 11px; font-weight: 800;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--od-blue);
      background: rgba(0,175,240,0.08);
      border: 1px solid rgba(0,175,240,0.2);
      padding: 6px 18px; border-radius: 999px;
      margin-bottom: 28px;
    }
    .od-svc-hero-title {
      font-size: clamp(48px, 7vw, 96px);
      font-weight: 900; letter-spacing: -0.04em; line-height: 0.95;
      margin-bottom: 24px;
    }
    .od-svc-hero-sub {
      font-size: clamp(16px, 2vw, 20px);
      color: var(--od-fg-3); max-width: 560px;
      margin: 0 auto 40px; line-height: 1.6;
    }
    .od-svc-hero-meta {
      display: flex; align-items: center; justify-content: center;
      gap: 20px; font-size: 14px; color: var(--od-fg-3); flex-wrap: wrap;
    }
    .od-svc-hero-meta strong { color: var(--od-fg); }
    .od-svc-hero-meta-sep { width: 4px; height: 4px; border-radius: 50%; background: var(--od-fg-4); }

    /* ── ACT GRID ── */
    .od-acts-section {
      padding: 96px 40px;
      position: relative;
    }
    .od-acts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      margin-top: 56px;
    }
    .od-act-card {
      background: var(--od-bg-2);
      border: 1px solid var(--od-border);
      border-radius: 16px;
      overflow: hidden;
      display: flex; flex-direction: column;
      transition: border-color 180ms, transform 180ms, box-shadow 180ms;
      cursor: default;
    }
    .od-act-card:hover {
      border-color: rgba(0,175,240,0.4);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,175,240,0.08);
    }
    .od-act-photo {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: var(--od-bg-3);
      border-bottom: 1px solid var(--od-border);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px;
      color: var(--od-fg-4);
      font-size: 12px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .od-act-photo-icon { font-size: 32px; opacity: 0.4; }
    .od-act-photo img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .od-act-body {
      padding: 20px 20px 0;
      display: flex; flex-direction: column; gap: 8px;
      flex: 1;
    }
    .od-act-icon { font-size: 24px; line-height: 1; }
    .od-act-name {
      font-size: 16px; font-weight: 800; color: var(--od-fg);
      letter-spacing: -0.02em;
    }
    .od-act-desc { font-size: 13px; color: var(--od-fg-3); line-height: 1.6; }
    .od-act-book {
      margin-top: auto; padding: 14px 0 20px;
      font-size: 12px; font-weight: 700;
      color: var(--od-blue); letter-spacing: 0.04em;
      text-decoration: none; display: block;
    }
    .od-act-book:hover { color: var(--od-fg); }

    /* ── EVENT TYPES LIST ── */
    .od-events-section {
      padding: 80px 40px;
      background: var(--od-bg-2);
      border-top: 1px solid var(--od-border);
      border-bottom: 1px solid var(--od-border);
    }
    .od-events-inner {
      max-width: 1180px; margin: 0 auto;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 64px; align-items: start;
    }
    .od-events-left h2 {
      font-size: clamp(32px, 4vw, 52px);
      font-weight: 900; letter-spacing: -0.03em;
      line-height: 1.05; margin-bottom: 16px;
    }
    .od-events-left p {
      font-size: 15px; color: var(--od-fg-3); line-height: 1.7;
      margin-bottom: 32px;
    }
    .od-events-list {
      list-style: none;
      display: flex; flex-direction: column; gap: 12px;
    }
    .od-events-list li {
      display: flex; align-items: center; gap: 14px;
      font-size: 15px; font-weight: 600; color: var(--od-fg);
    }
    .od-events-list li::before {
      content: '';
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--od-blue); flex-shrink: 0;
    }
    .od-events-list li span { color: var(--od-fg-3); font-weight: 400; font-size: 13px; margin-left: 4px; }

    @media (max-width: 768px) {
      .od-svc-hero { padding: 120px 20px 72px; }
      .od-acts-section { padding: 72px 20px; }
      .od-events-section { padding: 72px 20px; }
      .od-events-inner { grid-template-columns: 1fr; gap: 40px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="components/Nav.jsx?v=2"></script>
  <script type="text/babel" src="components/Footer.jsx?v=2"></script>
  <script type="text/babel" src="components/StepsRow.jsx?v=2"></script>
  <script type="text/babel" src="components/FinalCTA.jsx?v=2"></script>

  <script type="text/babel">
    const acts = [
      { icon: '🍫', name: 'Oompa Loompas',       desc: 'Full costume, character voices, group choreography. The crowd-stopper at every event.' },
      { icon: '🎄', name: 'Christmas Elves',       desc: 'Santa\'s helpers for holiday parties, corporate events, and mall activations.' },
      { icon: '☘️', name: 'Leprechauns',           desc: 'St. Patrick\'s Day staple. Also works year-round for Irish pubs, themed events, and anything luck-related.' },
      { icon: '🕺', name: 'Mini Elvis',            desc: 'Full jumpsuit, the moves, the voice. Vegas\'s favorite tribute — dwarf edition.' },
      { icon: '🎅', name: 'Mini Santa',            desc: 'Ho ho ho with extra chaos. Ideal for holiday parties, charity events, and brand activations.' },
      { icon: '💃', name: 'Mini Exotic Dancers',   desc: 'Professional entertainers who know how to work a room. Bachelor parties, clubs, private events.' },
      { icon: '🤼', name: 'Dwarf Wrestling',       desc: 'Full theatrical pro-wrestling show. Refs, storylines, crowd participation — the whole package.' },
      { icon: '🏋️', name: 'Dwarf Tossing',        desc: 'The classic. Safety harnesses, trained performers, and an unforgettable experience for everyone watching.' },
      { icon: '🏴‍☠️', name: 'Pirate Dwarfs',      desc: 'Arrr. Themed costumes, character work, great for kids\' events, corporate dos, and pirate-themed bars.' },
      { icon: '🦸', name: 'Mini Superheroes',      desc: 'Any hero, any costume. Kids\' parties, comic cons, brand events, and charity appearances.' },
      { icon: '🤠', name: 'Cowboy & Cowgirl Dwarfs', desc: 'Hats, boots, lassos. Country nights, rodeo themes, Western corporate events.' },
      { icon: '🃏', name: 'Court Jesters',         desc: 'Medieval fools for Renaissance fairs, themed galas, and any event that needs comic chaos.' },
      { icon: '🥊', name: 'Mini Boxers',           desc: 'Fight nights, sports bars, championship events. They come ready to put on a show.' },
      { icon: '👑', name: 'Mini Drag Queens',      desc: 'Glamour, performance, and crowd work. Pride events, drag brunches, and high-energy parties.' },
      { icon: '🤵', name: 'Dwarf Butlers',         desc: 'Formal attire, trays, attitude. Perfect for upscale events that want a twist.' },
      { icon: '🧙', name: 'Wizards & Warlocks',    desc: 'Fantasy-themed performances. Conventions, Renaissance fairs, themed birthday parties.' },
      { icon: '🎤', name: 'Mini Emcees',           desc: 'High-energy hosts who keep the crowd locked in all night. Great for galas, tournaments, and parties.' },
      { icon: '🍺', name: 'Beer Wenches',          desc: 'Lederhosen-clad servers and entertainers. Oktoberfest events, German-themed bars, and brew fests.' },
      { icon: '🦊', name: 'Furry & Mascot Dwarfs', desc: 'Custom mascot costumes, brand characters, and themed animal performers for activations and events.' },
      { icon: '✨', name: 'Custom Characters',     desc: 'Have a wild idea? We\'ll cast and costume for it. If you can dream it up, we can book it.' },
    ];

    const eventTypes = [
      { label: 'Bachelor & Bachelorette Parties', note: 'our most booked category' },
      { label: 'Birthday Parties & Milestone Celebrations', note: null },
      { label: 'Corporate Events & Brand Activations', note: null },
      { label: 'Vegas Clubs, Pool Parties & Nightlife', note: null },
      { label: 'Private & VIP Parties', note: null },
      { label: 'Film, TV & Commercial Productions', note: null },
      { label: 'Trade Shows & Promotional Events', note: null },
      { label: 'Holiday Parties & Seasonal Events', note: null },
      { label: 'Sporting Events & Fight Nights', note: null },
      { label: 'Charity & Fundraiser Galas', note: null },
      { label: 'Bar & Restaurant Activations', note: null },
      { label: 'Conventions & Pop Culture Events', note: null },
    ];

    const ServicesHero = () => (
      <section className="od-svc-hero">
        <div className="od-svc-hero-glow" aria-hidden="true" />
        <div className="od-svc-hero-eyebrow">What we book</div>
        <h1 className="od-svc-hero-title">
          20+ acts.<br/>
          <span className="od-accent-blue">One agency.</span>
        </h1>
        <p className="od-svc-hero-sub">
          From Oompa Loompas to mini Elvises — if it involves dwarf entertainment,
          we've booked it, perfected it, and can have it at your event.
        </p>
        <div className="od-svc-hero-meta">
          <span>From <strong>$600</strong></span>
          <span className="od-svc-hero-meta-sep" />
          <span>Quote in <strong>&lt; 24 hrs</strong></span>
          <span className="od-svc-hero-meta-sep" />
          <span>We travel <strong>anywhere</strong></span>
          <span className="od-svc-hero-meta-sep" />
          <span><strong>500+</strong> bookings</span>
        </div>
      </section>
    );

    const ActsGrid = () => (
      <section className="od-acts-section">
        <div className="od-inner">
          <div className="od-section-head">
            <div>
              <div className="od-eyebrow">The roster</div>
              <h2 className="od-sec-title">Pick your act.<br/><span className="od-accent-blue">We handle the rest.</span></h2>
            </div>
            <p className="od-sec-sub">
              Every act on this list is bookable right now. Don't see exactly what you want?
              Describe it in the form — we'll make it happen.
            </p>
          </div>
          <div className="od-acts-grid">
            {acts.map((a) => (
              <div key={a.name} className="od-act-card">
                <div className="od-act-photo">
                  {a.img
                    ? <img src={a.img} alt={a.name} />
                    : <><span className="od-act-photo-icon">{a.icon}</span><span>Photo coming soon</span></>
                  }
                </div>
                <div className="od-act-body">
                  <div className="od-act-name">{a.name}</div>
                  <div className="od-act-desc">{a.desc}</div>
                  <a href="intake.html" className="od-act-book">Book this act →</a>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>
    );

    const EventTypesList = () => (
      <section className="od-events-section">
        <div className="od-events-inner">
          <div className="od-events-left">
            <div className="od-eyebrow">Events we cover</div>
            <h2>Any event.<br/><span className="od-accent-blue">Any size.</span></h2>
            <p>
              We've worked every type of event there is. Private or public, 10 guests
              or 10,000 — the act scales to the room. If you have an event and need
              entertainment people won't stop talking about, you're in the right place.
            </p>
            <a href="intake.html" className="od-btn-primary">
              Get a custom quote →
            </a>
          </div>
          <div>
            <ul className="od-events-list">
              {eventTypes.map((e) => (
                <li key={e.label}>
                  {e.label}
                  {e.note && <span>— {e.note}</span>}
                </li>
              ))}
            </ul>
          </div>
        </div>
      </section>
    );

    const App = () => (
      <>
        <Nav />
        <ServicesHero />
        <ActsGrid />
        <EventTypesList />
        <StepsRow />
        <FinalCTA />
        <Footer />
      </>
    );
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
