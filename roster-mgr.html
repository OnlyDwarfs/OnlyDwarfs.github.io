<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roster Manager</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #0d0d0d; color: #ccc; font-family: 'Inter', sans-serif; min-height: 100vh; }

  .page { padding: 28px 32px; }
  .page-header { margin-bottom: 22px; }
  .breadcrumb { font-size: 11px; color: #444; margin-bottom: 6px; }
  .breadcrumb span { color: #888; }
  .page-title { font-size: 22px; font-weight: 900; color: #fff; }
  .page-sub { font-size: 13px; color: #555; margin-top: 4px; }

  .notice { border-radius: 7px; padding: 10px 14px; font-size: 12px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
  .notice-blue { background: rgba(0,175,240,0.07); border: 1px solid rgba(0,175,240,0.2); color: #00AFF0; }

  .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 18px; }
  .search-box {
    flex: 1; max-width: 280px;
    padding: 7px 12px; background: #1a1a1a;
    border: 1px solid #2a2a2a; border-radius: 7px;
    font-size: 13px; color: #ccc; font-family: inherit; outline: none;
  }
  .search-box:focus { border-color: #00AFF0; }

  .section-hd {
    font-size: 11px; font-weight: 700; color: #555; text-transform: uppercase;
    letter-spacing: 0.06em; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
  }
  .section-hd .count { background: #222; border-radius: 20px; padding: 1px 8px; font-size: 10px; color: #888; }

  .roster-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-bottom: 28px; }

  .talent-card {
    background: #1a1a1a; border: 1px solid #222; border-radius: 10px;
    padding: 16px; cursor: pointer; transition: border-color 150ms;
    position: relative;
  }
  .talent-card:hover { border-color: #00AFF0; }
  .talent-card.inactive { opacity: 0.5; }
  .talent-card.inactive:hover { opacity: 0.8; border-color: #333; }

  .card-photo {
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg, #1a1a2e, #0d1a40);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 900; color: #00AFF0;
    margin: 0 auto 10px; overflow: hidden;
  }
  .card-photo img { width: 100%; height: 100%; object-fit: cover; }

  .card-name { font-size: 13px; font-weight: 700; color: #ddd; text-align: center; margin-bottom: 3px; }
  .card-type { font-size: 11px; color: #555; text-align: center; margin-bottom: 10px; }
  .card-bio  { font-size: 11px; color: #444; line-height: 1.5; margin-bottom: 10px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  .card-foot { display: flex; gap: 6px; justify-content: center; }

  .tag { display: inline-block; border-radius: 20px; padding: 2px 9px; font-size: 10px; font-weight: 600; }
  .tag-green  { background: rgba(34,197,94,0.1);  color: #4ade80;  border: 1px solid rgba(34,197,94,0.2);  }
  .tag-grey   { background: rgba(255,255,255,0.04); color: #555; border: 1px solid #2a2a2a; }
  .tag-orange { background: rgba(249,115,22,0.1); color: #fb923c; border: 1px solid rgba(249,115,22,0.2); }

  .btn { display: inline-block; padding: 5px 11px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; border: none; font-family: inherit; transition: opacity 120ms; }
  .btn:hover { opacity: 0.85; }
  .btn-blue  { background: #00AFF0; color: #000; }
  .btn-dark  { background: #222; border: 1px solid #333; color: #888; }
  .btn-dark:hover { border-color: #00AFF0; color: #00AFF0; opacity: 1; }
  .btn-red-ghost { background: transparent; border: 1px solid rgba(239,68,68,0.3); color: #f87171; }
  .btn-red-ghost:hover { background: rgba(239,68,68,0.08); opacity: 1; }
  .btn-green-ghost { background: transparent; border: 1px solid rgba(34,197,94,0.3); color: #4ade80; }
  .btn-green-ghost:hover { background: rgba(34,197,94,0.08); opacity: 1; }
  .btn-lg { padding: 8px 18px; font-size: 12px; }

  /* Edit slide-in panel */
  .edit-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 100; align-items: flex-start; justify-content: flex-end;
  }
  .edit-overlay.open { display: flex; }
  .edit-panel {
    background: #111; border-left: 1px solid #222;
    width: 360px; min-height: 100vh;
    padding: 24px 22px; overflow-y: auto;
    animation: slideIn 200ms ease;
  }
  @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .edit-panel h2 { font-size: 15px; font-weight: 800; color: #fff; margin-bottom: 4px; }
  .edit-panel .sub { font-size: 12px; color: #555; margin-bottom: 20px; }

  .form-row { margin-bottom: 14px; }
  .form-row label { display: block; font-size: 10px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
  .form-row input, .form-row select, .form-row textarea {
    width: 100%; padding: 8px 10px;
    background: #1a1a1a; border: 1px solid #2a2a2a;
    border-radius: 7px; font-size: 13px; color: #ccc; font-family: inherit; outline: none;
  }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: #00AFF0; }
  .form-row textarea { height: 80px; resize: vertical; }

  .edit-actions { display: flex; gap: 8px; margin-top: 20px; padding-top: 16px; border-top: 1px solid #1a1a1a; }

  /* Status section toggle */
  .visibility-row {
    display: flex; align-items: center; gap: 10px;
    background: #1a1a1a; border: 1px solid #222; border-radius: 8px;
    padding: 12px 14px; margin-bottom: 20px;
  }
  .visibility-row .vr-label { flex: 1; font-size: 12px; font-weight: 600; color: #aaa; }
  .visibility-row .vr-sub { font-size: 11px; color: #444; margin-top: 2px; }

  /* Loading */
  .state-msg { text-align: center; padding: 40px; color: #444; font-size: 13px; }
  .spinner { width: 20px; height: 20px; border: 2px solid #222; border-top-color: #00AFF0; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  #toast { position: fixed; bottom: 20px; right: 20px; padding: 10px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; opacity: 0; transition: opacity 220ms; pointer-events: none; z-index: 999; }
  #toast.show { opacity: 1; }
  #toast.success { background: #166534; color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
  #toast.error   { background: #7f1d1d; color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }

  .empty-state { text-align: center; padding: 28px; color: #444; font-size: 12px; border: 1px dashed #222; border-radius: 10px; }

  /* Photo upload widget */
  .photo-upload-wrap { display: flex; gap: 12px; align-items: flex-start; }
  .photo-preview {
    width: 72px; height: 72px; border-radius: 10px; flex-shrink: 0;
    background: #1a1a1a; border: 1px dashed #333;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; overflow: hidden; cursor: pointer; transition: border-color 150ms;
  }
  .photo-preview:hover { border-color: #00AFF0; }
  .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
  .photo-upload-right { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .photo-upload-right input[type="url"] { width: 100%; }
  .photo-upload-btns { display: flex; gap: 6px; }
  .btn-upload { background: #1a1a1a; border: 1px solid #333; color: #888; padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .btn-upload:hover { border-color: #00AFF0; color: #00AFF0; }
  .btn-remove-photo { background: transparent; border: 1px solid rgba(239,68,68,0.25); color: #f87171; padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit; display: none; }
  .btn-remove-photo:hover { background: rgba(239,68,68,0.08); }
  .photo-hint { font-size: 10px; color: #444; line-height: 1.5; }
</style>
</head>
<body>
<div class="page">
  <div class="page-header">
    <div class="breadcrumb">Site Manager › <span>Roster Manager</span></div>
    <div class="page-title">Roster Manager</div>
    <div class="page-sub">Control who appears on the public roster page, edit bios and photos.</div>
  </div>

  <div class="notice notice-blue">ℹ️ Only <strong>Active</strong> performers appear on the public roster. Toggle visibility to add or remove someone.</div>

  <div class="toolbar">
    <input class="search-box" type="text" id="search-box" placeholder="Search by name or type…" oninput="renderAll()">
    <button class="btn btn-blue btn-lg" onclick="openCreate()" style="margin-left:auto">+ Add Performer</button>
    <button class="btn btn-dark btn-lg" onclick="load()">↻ Refresh</button>
    <a href="roster.html" target="_blank" class="btn btn-dark btn-lg">View Public Page ↗</a>
  </div>

  <div id="main-content">
    <div class="state-msg"><div class="spinner"></div>Loading roster…</div>
  </div>
</div>

<!-- Edit Panel -->
<div class="edit-overlay" id="edit-overlay" onclick="closeEdit(event)">
  <div class="edit-panel" id="edit-panel">
    <!-- filled by JS -->
  </div>
</div>

<div id="toast"></div>

<script>
if (!localStorage.getItem('od_auth')) { window.top.location.href = 'login.html'; }

const CRM_URL = 'https://script.google.com/macros/s/AKfycbwEo1SmfVmXy8WCopvrbmgh3Rmea-2jVTE4VRxfLoj58PuwW3nsaVEroIZuCNJzmC0Jdw/exec';
let allTalent = [];
let editingId = null;

/* ── LOAD ── */
async function load() {
  const mc = document.getElementById('main-content');
  mc.innerHTML = '<div class="state-msg"><div class="spinner"></div>Loading roster…</div>';

  // slow-load warning after 8 seconds
  const slowTimer = setTimeout(() => {
    const s = mc.querySelector('.state-msg');
    if (s) s.innerHTML = '<div class="spinner"></div>Still loading — Apps Script cold start can take 15–30 sec…';
  }, 8000);

  try {
    const ctrl = new AbortController();
    const kill = setTimeout(() => ctrl.abort(), 35000);
    const resp = await fetch(CRM_URL + '?action=getAllTalent', { signal: ctrl.signal });
    clearTimeout(kill);
    const data = await resp.json();
    clearTimeout(slowTimer);
    if (!data.talent) throw new Error(data.error || 'No talent array in response');
    allTalent = data.talent;
    renderAll();
  } catch(e) {
    clearTimeout(slowTimer);
    mc.innerHTML = `<div class="state-msg">⚠️ ${e.name === 'AbortError' ? 'Request timed out (35s). Apps Script may be down — try Refresh.' : e.message}</div>`;
  }
}

/* ── RENDER ── */
function renderAll() {
  const q = document.getElementById('search-box').value.toLowerCase();
  let rows = allTalent;
  if (q) rows = rows.filter(p =>
    (p.name || '').toLowerCase().includes(q) ||
    (p.performerType || '').toLowerCase().includes(q)
  );

  const active   = rows.filter(p => p.status === 'Active');
  const inactive = rows.filter(p => p.status !== 'Active');

  let html = '';

  // On Roster
  html += `<div class="section-hd">🟢 On Public Roster <span class="count">${active.length}</span></div>`;
  if (active.length) {
    html += `<div class="roster-grid">${active.map(buildCard).join('')}</div>`;
  } else {
    html += `<div class="empty-state" style="margin-bottom:28px">No active performers on the roster.</div>`;
  }

  // Off Roster
  html += `<div class="section-hd">⚫ Off Roster / Inactive <span class="count">${inactive.length}</span></div>`;
  if (inactive.length) {
    html += `<div class="roster-grid">${inactive.map(buildCard).join('')}</div>`;
  } else {
    html += `<div class="empty-state">No inactive performers.</div>`;
  }

  document.getElementById('main-content').innerHTML = html;
}

function buildCard(p) {
  const init    = (p.name || '?')[0].toUpperCase();
  const isActive = p.status === 'Active';
  const photoEl = p.photo
    ? `<img src="${p.photo}" alt="${p.name}" onerror="this.style.display='none'">`
    : init;

  const statusTag = isActive
    ? `<span class="tag tag-green">On Roster</span>`
    : `<span class="tag tag-grey">${p.status || 'Inactive'}</span>`;

  const toggleBtn = isActive
    ? `<button class="btn btn-red-ghost" onclick="event.stopPropagation();toggleVisibility('${p.id}','Inactive')">Remove</button>`
    : `<button class="btn btn-green-ghost" onclick="event.stopPropagation();toggleVisibility('${p.id}','Active')">Add to Roster</button>`;

  return `
    <div class="talent-card${isActive ? '' : ' inactive'}" onclick="openEdit('${p.id}')">
      <div class="card-photo">${photoEl}</div>
      <div class="card-name">${p.name}</div>
      <div class="card-type">${p.performerType || '—'}</div>
      ${p.bio ? `<div class="card-bio">${p.bio}</div>` : '<div class="card-bio" style="color:#333;font-style:italic">No bio yet</div>'}
      <div class="card-foot">
        ${statusTag}
        <button class="btn btn-dark" onclick="event.stopPropagation();openEdit('${p.id}')">Edit</button>
        ${toggleBtn}
      </div>
    </div>`;
}

/* ── PHOTO UPLOAD HELPERS ── */
function compressImage(file, maxSize = 480, quality = 0.82) {
  return new Promise((resolve, reject) => {
    if (file.size > 8 * 1024 * 1024) { reject(new Error('File too large — max 8MB')); return; }
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Could not read file'));
    reader.onload = e => {
      const img = new Image();
      img.onerror = () => reject(new Error('Invalid image'));
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > h) { if (w > maxSize) { h = Math.round(h * maxSize / w); w = maxSize; } }
        else        { if (h > maxSize) { w = Math.round(w * maxSize / h); h = maxSize; } }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// Renders the photo upload widget HTML for edit/create panels
function photoWidgetHTML(currentSrc) {
  const previewContent = currentSrc
    ? `<img src="${currentSrc}" id="ep-photo-preview-img" alt="Preview">`
    : `<span id="ep-photo-preview-img">📷</span>`;
  return `
    <div class="photo-upload-wrap">
      <div class="photo-preview" id="ep-photo-preview" onclick="document.getElementById('ep-photo-file').click()">
        ${previewContent}
      </div>
      <div class="photo-upload-right">
        <input type="url" id="ep-photo" placeholder="Or paste URL…" value="${currentSrc || ''}" oninput="onPhotoUrlInput()">
        <div class="photo-upload-btns">
          <button type="button" class="btn-upload" onclick="document.getElementById('ep-photo-file').click()">📁 Upload Photo</button>
          <button type="button" class="btn-remove-photo" id="ep-photo-remove" onclick="clearPhoto()" ${currentSrc ? 'style="display:inline-block"' : ''}>Remove</button>
        </div>
        <div class="photo-hint">Click the preview or Upload to choose a file. Max 8MB · JPEG/PNG/WebP</div>
      </div>
    </div>
    <input type="file" id="ep-photo-file" accept="image/*" style="display:none" onchange="handlePhotoUpload(this)">`;
}

async function handlePhotoUpload(input) {
  const file = input.files[0];
  if (!file) return;
  try {
    const compressed = await compressImage(file);
    setPhotoPreview(compressed);
    document.getElementById('ep-photo').value = ''; // clear URL field — using uploaded data
    toast('Photo ready ✓', 'success');
  } catch(e) {
    toast(e.message, 'error');
  }
  input.value = '';
}

function setPhotoPreview(src) {
  const preview = document.getElementById('ep-photo-preview');
  preview.innerHTML = src
    ? `<img src="${src}" id="ep-photo-preview-img" alt="Preview">`
    : `<span id="ep-photo-preview-img">📷</span>`;
  const removeBtn = document.getElementById('ep-photo-remove');
  if (removeBtn) removeBtn.style.display = src ? 'inline-block' : 'none';
  preview._uploadedData = src || null;
}

function clearPhoto() {
  setPhotoPreview(null);
  document.getElementById('ep-photo').value = '';
}

function onPhotoUrlInput() {
  const val = document.getElementById('ep-photo').value.trim();
  const preview = document.getElementById('ep-photo-preview');
  preview._uploadedData = null;
  setPhotoPreview(val || null);
}

// Returns the final photo value: uploaded base64 takes priority over URL field
function getFinalPhoto(performerId) {
  const preview = document.getElementById('ep-photo-preview');
  if (preview && preview._uploadedData) {
    // Store uploaded photo in localStorage so public roster can use it
    if (performerId) localStorage.setItem('od_roster_photo_' + performerId, preview._uploadedData);
    return preview._uploadedData;
  }
  return document.getElementById('ep-photo').value.trim();
}

/* ── CREATE PANEL ── */
function openCreate() {
  editingId = null;
  document.getElementById('edit-panel').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div>
        <h2>Add Performer</h2>
        <div class="sub">Creates a new entry directly on the roster.</div>
      </div>
      <button class="btn btn-dark" onclick="closeEdit()">✕</button>
    </div>

    <div class="form-row">
      <label>Display Name <span style="color:#f87171">*</span></label>
      <input id="ep-name" type="text" placeholder="Full name" autofocus>
    </div>
    <div class="form-row">
      <label>Performer Type / Act</label>
      <input id="ep-type" type="text" placeholder="e.g. Exotic Entertainer, Comedian…">
    </div>
    <div class="form-row">
      <label>Location</label>
      <input id="ep-location" type="text" placeholder="City, State">
    </div>
    <div class="form-row">
      <label>Bio <span style="font-weight:400;text-transform:none;color:#444">(shown publicly)</span></label>
      <textarea id="ep-bio" placeholder="Short bio for the roster page…"></textarea>
    </div>
    <div class="form-row">
      <label>Photo</label>
      ${photoWidgetHTML('')}
    </div>
    <div class="form-row">
      <label>Instagram Handle</label>
      <input id="ep-social" type="text" placeholder="username (no @)">
    </div>
    <div class="form-row">
      <label>Rate</label>
      <input id="ep-rate" type="text" placeholder="e.g. $400/hr">
    </div>
    <div class="form-row">
      <label>Email</label>
      <input id="ep-email" type="email" placeholder="optional">
    </div>
    <div class="form-row">
      <label>Phone</label>
      <input id="ep-phone" type="text" placeholder="optional">
    </div>
    <div class="form-row">
      <label>Visibility</label>
      <select id="ep-status">
        <option value="Active" selected>Active — show on public roster</option>
        <option value="Inactive">Inactive — hidden from public</option>
      </select>
    </div>

    <div class="edit-actions">
      <button class="btn btn-blue btn-lg" onclick="createPerformer()">Create Performer</button>
      <button class="btn btn-dark btn-lg" onclick="closeEdit()">Cancel</button>
    </div>`;

  document.getElementById('edit-overlay').classList.add('open');
}

async function createPerformer() {
  const name = document.getElementById('ep-name').value.trim();
  if (!name) { toast('Name is required', 'error'); return; }

  // Get photo — uploaded base64 stored locally, URL passed to sheet
  const photoVal = getFinalPhoto(null); // id unknown yet, will store after we get it back
  const isUpload = photoVal && photoVal.startsWith('data:');

  const params = new URLSearchParams({
    action:        'createTalent',
    name,
    performerType: document.getElementById('ep-type').value.trim(),
    location:      document.getElementById('ep-location').value.trim(),
    bio:           document.getElementById('ep-bio').value.trim(),
    photo:         isUpload ? '' : photoVal, // don't send base64 over URL
    social:        document.getElementById('ep-social').value.trim().replace(/^@/, ''),
    rate:          document.getElementById('ep-rate').value.trim(),
    email:         document.getElementById('ep-email').value.trim(),
    phone:         document.getElementById('ep-phone').value.trim(),
    status:        document.getElementById('ep-status').value,
  });

  const btn = document.querySelector('#edit-panel .btn-blue');
  btn.textContent = 'Creating…'; btn.disabled = true;

  try {
    const r = await fetch(`${CRM_URL}?${params}`).then(r => r.json());
    if (!r.success) throw new Error(r.error || 'Failed');
    // If photo was an upload, store it in localStorage keyed by the new ID
    if (isUpload && r.id) localStorage.setItem('od_roster_photo_' + r.id, photoVal);
    document.getElementById('edit-overlay').classList.remove('open');
    toast(`${name} added ✓`, 'success');
    await load();
  } catch(e) {
    btn.textContent = 'Create Performer'; btn.disabled = false;
    toast('Error: ' + e.message, 'error');
  }
}

/* ── EDIT PANEL ── */
function openEdit(id) {
  editingId = id;
  const p = allTalent.find(x => x.id === id);
  if (!p) return;

  const isActive = p.status === 'Active';
  document.getElementById('edit-panel').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div>
        <h2>${p.name}</h2>
        <div class="sub">${p.id} · ${p.performerType || 'Performer'}</div>
      </div>
      <button class="btn btn-dark" onclick="closeEdit()">✕</button>
    </div>

    <div class="visibility-row">
      <div>
        <div class="vr-label">Public Visibility</div>
        <div class="vr-sub">Controls whether this performer shows on the roster page.</div>
      </div>
      ${isActive
        ? `<button class="btn btn-red-ghost" onclick="toggleVisibility('${p.id}','Inactive')">Remove from Roster</button>`
        : `<button class="btn btn-green-ghost" onclick="toggleVisibility('${p.id}','Active')">Add to Roster</button>`}
    </div>

    <div class="form-row">
      <label>Display Name</label>
      <input id="ep-name" type="text" value="${p.name || ''}" placeholder="Full name">
    </div>
    <div class="form-row">
      <label>Performer Type / Act</label>
      <input id="ep-type" type="text" value="${p.performerType || ''}" placeholder="e.g. Exotic Entertainer">
    </div>
    <div class="form-row">
      <label>Location</label>
      <input id="ep-location" type="text" value="${p.location || ''}" placeholder="City, State">
    </div>
    <div class="form-row">
      <label>Bio <span style="font-weight:400;text-transform:none;color:#444">(shows on public roster)</span></label>
      <textarea id="ep-bio" placeholder="Short bio for the public roster page…">${p.bio || ''}</textarea>
    </div>
    <div class="form-row">
      <label>Photo</label>
      ${photoWidgetHTML(localStorage.getItem('od_roster_photo_' + p.id) || p.photo || '')}
    </div>
    <div class="form-row">
      <label>Instagram Handle</label>
      <input id="ep-social" type="text" value="${p.social || ''}" placeholder="username (no @)">
    </div>
    <div class="form-row">
      <label>Rate</label>
      <input id="ep-rate" type="text" value="${p.rate || ''}" placeholder="e.g. $400/hr">
    </div>

    <div class="edit-actions">
      <button class="btn btn-blue btn-lg" onclick="saveEdit('${p.id}')">Save Changes</button>
      <button class="btn btn-dark btn-lg" onclick="closeEdit()">Cancel</button>
    </div>`;

  document.getElementById('edit-overlay').classList.add('open');
}

function closeEdit(e) {
  if (e && e.target !== document.getElementById('edit-overlay')) return;
  document.getElementById('edit-overlay').classList.remove('open');
  editingId = null;
}

/* ── SAVE EDIT ── */
async function saveEdit(id) {
  const p = allTalent.find(x => x.id === id);
  if (!p) return;

  const name          = document.getElementById('ep-name').value.trim();
  const performerType = document.getElementById('ep-type').value.trim();
  const location      = document.getElementById('ep-location').value.trim();
  const bio           = document.getElementById('ep-bio').value.trim();
  const social        = document.getElementById('ep-social').value.trim().replace(/^@/, '');
  const rate          = document.getElementById('ep-rate').value.trim();

  // Photo: if uploaded, store in localStorage and don't send base64 to sheet
  const photoVal  = getFinalPhoto(id);
  const isUpload  = photoVal && photoVal.startsWith('data:');
  const photo     = isUpload ? (p.photo || '') : photoVal; // keep old sheet URL if upload

  const params = new URLSearchParams({ action: 'updateTalent', id,
    name, performerType, location, bio, photo, social, rate });

  try {
    const r = await fetch(`${CRM_URL}?${params}`).then(r => r.json());
    if (!r.success) throw new Error(r.error || 'Update failed');
    // Update local data — if uploaded, use the base64 for immediate card preview
    Object.assign(p, { name, performerType, location, bio, photo: isUpload ? photoVal : photo, social, rate });
    document.getElementById('edit-overlay').classList.remove('open');
    editingId = null;
    renderAll();
    toast('Saved ✓', 'success');
  } catch(e) {
    toast('Error: ' + e.message, 'error');
  }
}
