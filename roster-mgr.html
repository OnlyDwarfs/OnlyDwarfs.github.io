<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Performer Directory</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#0d0d0d;color:#ccc;font-family:'Inter',sans-serif;min-height:100vh;font-size:13px}

  /* ── PAGE SHELL ── */
  .page{display:flex;flex-direction:column;height:100vh;overflow:hidden}
  .top-bar{padding:14px 20px;border-bottom:1px solid #1a1a1a;flex-shrink:0;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .page-title{font-size:16px;font-weight:900;color:#fff;white-space:nowrap}

  /* ── STATS ── */
  .stat-pills{display:flex;gap:6px;margin-left:4px}
  .sp{background:#1a1a1a;border:1px solid #222;border-radius:6px;padding:4px 10px;font-size:11px;color:#555;white-space:nowrap}
  .sp b{font-weight:800;margin-right:3px}
  .sp.green b{color:#22c55e}
  .sp.yellow b{color:#f59e0b}
  .sp.blue b{color:#00AFF0}

  /* ── TOOLBAR ── */
  .toolbar{padding:10px 20px;border-bottom:1px solid #1a1a1a;flex-shrink:0;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .search-wrap{position:relative;flex:1;min-width:160px;max-width:260px}
  .search-wrap svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:#444;pointer-events:none;flex-shrink:0}
  .search-box{width:100%;padding:6px 8px 6px 28px;background:#141414;border:1px solid #222;border-radius:6px;font-size:12px;color:#ccc;font-family:inherit;outline:none}
  .search-box::placeholder{color:#333}
  .search-box:focus{border-color:#00AFF0}
  .fsel{padding:6px 8px;background:#141414;border:1px solid #222;border-radius:6px;font-size:12px;color:#888;font-family:inherit;outline:none;cursor:pointer}
  .fsel:focus{border-color:#00AFF0}
  .result-count{font-size:11px;color:#333;margin-left:auto;white-space:nowrap}
  .btn-sm{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #2a2a2a;background:#1a1a1a;color:#888;font-family:inherit;white-space:nowrap}
  .btn-sm:hover{border-color:#555;color:#ccc}

  /* ── TABLE AREA ── */
  .table-wrap{flex:1;overflow:auto;position:relative}
  table{width:100%;border-collapse:collapse;min-width:780px}

  /* Header */
  thead tr{background:#111;position:sticky;top:0;z-index:10}
  th{padding:8px 10px;text-align:left;font-size:10px;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid #1e1e1e;white-space:nowrap;user-select:none;cursor:pointer}
  th:hover{color:#888}
  th.sorted-asc::after{content:' ▲';font-size:8px;color:#00AFF0}
  th.sorted-desc::after{content:' ▼';font-size:8px;color:#00AFF0}
  th.no-sort{cursor:default}
  th.no-sort:hover{color:#444}

  /* Rows */
  tbody tr{border-bottom:1px solid #161616;cursor:pointer;transition:background 80ms}
  tbody tr:hover{background:#141414}
  tbody tr.selected{background:#0a1520;border-color:#1a3a5c}
  tbody tr.selected td{border-bottom-color:#1a3a5c}

  td{padding:8px 10px;vertical-align:middle;font-size:12px;color:#aaa;white-space:nowrap}
  td.wrap{white-space:normal;max-width:200px}

  /* Row # */
  .td-num{color:#333;font-size:11px;font-variant-numeric:tabular-nums;width:36px;text-align:center}

  /* Avatar cell */
  .td-avatar{width:36px;padding:6px 4px 6px 10px}
  .avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#1a1a2e,#0d1a40);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#00AFF0;overflow:hidden;flex-shrink:0}
  .avatar img{width:100%;height:100%;object-fit:cover}

  /* Name cell */
  .td-name{min-width:130px}
  .n-name{font-size:12px;font-weight:700;color:#ddd}
  .n-stage{font-size:10px;color:#444;margin-top:1px}

  /* Phone cell */
  .td-phone{min-width:120px}
  .phone-link{color:#00AFF0;font-weight:600;text-decoration:none;font-variant-numeric:tabular-nums}
  .phone-link:hover{text-decoration:underline}
  .no-data{color:#2a2a2a;font-style:italic}

  /* Email */
  .email-link{color:#888;text-decoration:none;max-width:180px;overflow:hidden;text-overflow:ellipsis;display:block}
  .email-link:hover{color:#00AFF0}

  /* Location */
  .td-loc{max-width:130px;overflow:hidden;text-overflow:ellipsis}

  /* Skills */
  .td-skills{max-width:160px}
  .skill-tags{display:flex;gap:3px;flex-wrap:wrap}
  .skill-tag{background:#1a1a1a;border:1px solid #222;border-radius:4px;padding:1px 6px;font-size:10px;color:#666;white-space:nowrap}

  /* Status */
  .td-status{width:90px}
  .badge{display:inline-block;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.02em;white-space:nowrap}
  .badge-active{background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.25)}
  .badge-pending{background:rgba(245,158,11,.1);color:#f59e0b;border:1px solid rgba(245,158,11,.2)}
  .badge-inactive{background:rgba(100,100,100,.08);color:#444;border:1px solid #1e1e1e}

  /* Actions */
  .td-act{width:50px;text-align:right;padding-right:12px}
  .row-btn{background:none;border:1px solid #222;border-radius:5px;padding:3px 8px;font-size:10px;color:#555;cursor:pointer;font-family:inherit}
  .row-btn:hover{border-color:#555;color:#aaa}

  /* Empty / loading */
  .tbl-msg td{text-align:center;padding:40px;color:#333;font-size:13px}
  .spinner{display:inline-block;width:20px;height:20px;border:2px solid #222;border-top-color:#00AFF0;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── DETAIL PANEL ── */
  .dp-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:none;backdrop-filter:blur(2px)}
  .dp-overlay.open{display:block}
  .dp{position:fixed;top:0;right:0;height:100vh;width:400px;max-width:95vw;background:#111;border-left:1px solid #1e1e1e;z-index:101;display:flex;flex-direction:column;transform:translateX(100%);transition:transform 200ms ease}
  .dp.open{transform:translateX(0)}

  /* DP Header */
  .dp-hd{padding:16px 18px 14px;border-bottom:1px solid #1e1e1e;flex-shrink:0}
  .dp-close-btn{float:right;background:none;border:1px solid #252525;border-radius:5px;padding:3px 9px;font-size:11px;color:#555;cursor:pointer;margin-top:2px}
  .dp-close-btn:hover{color:#aaa;border-color:#555}
  .dp-profile{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .dp-av{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#1a1a2e,#0d1a40);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#00AFF0;overflow:hidden;flex-shrink:0}
  .dp-av img{width:100%;height:100%;object-fit:cover}
  .dp-hd-name{font-size:15px;font-weight:900;color:#fff}
  .dp-hd-stage{font-size:11px;color:#555;margin-top:2px}
  .dp-hd-id{font-size:10px;color:#2a2a2a;margin-top:2px}

  /* Status toggle */
  .st-row{display:flex;gap:4px}
  .st-btn{flex:1;padding:5px 4px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;text-align:center;border:1px solid #222;background:#161616;color:#444;transition:all 100ms;font-family:inherit}
  .st-btn.is-active  {background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.4);color:#22c55e}
  .st-btn.is-pending {background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.3);color:#f59e0b}
  .st-btn.is-inactive{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.2);color:#ef4444}
  .st-row.saving{opacity:.4;pointer-events:none}

  /* DP Body */
  .dp-body{flex:1;overflow-y:auto;padding:14px 18px}
  .dp-sec{margin-bottom:16px}
  .dp-sec-hd{font-size:9px;font-weight:800;color:#333;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .dp-sec-hd::after{content:'';flex:1;height:1px;background:#1a1a1a}
  .field-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .field{background:#141414;border:1px solid #1e1e1e;border-radius:6px;padding:8px 10px}
  .field.full{grid-column:1/-1}
  .field .lbl{font-size:9px;color:#333;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
  .field .val{font-size:12px;color:#bbb;word-break:break-all;line-height:1.4}
  .field .val.dim{color:#2d2d2d;font-style:italic}
  .field a{color:#00AFF0;text-decoration:none}
  .field a:hover{text-decoration:underline}
  .field .val.phone-big{font-size:14px;font-weight:700;color:#00AFF0}

  /* Edit form */
  .edit-section{display:none}
  .edit-section.show{display:block}
  .view-section.hide{display:none}
  .form-row{margin-bottom:9px}
  .form-row label{display:block;font-size:9px;font-weight:700;color:#333;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
  .form-row input,.form-row textarea{width:100%;padding:6px 9px;background:#141414;border:1px solid #222;border-radius:6px;font-size:12px;color:#ccc;font-family:inherit;outline:none}
  .form-row input:focus,.form-row textarea:focus{border-color:#00AFF0}
  .form-row textarea{resize:vertical;min-height:60px}
  .form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}

  /* DP Footer */
  .dp-ft{padding:12px 18px;border-top:1px solid #1e1e1e;display:flex;gap:6px;flex-shrink:0;align-items:center}
  .btn{padding:7px 13px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all 100ms}
  .btn-blue{background:#00AFF0;color:#000}
  .btn-blue:hover{background:#0099d0}
  .btn-ghost{background:#1a1a1a;color:#888;border:1px solid #252525}
  .btn-ghost:hover{border-color:#555;color:#ddd}
  .btn:disabled{opacity:.4;pointer-events:none}
  .save-ok{font-size:11px;color:#22c55e;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:5px;padding:4px 10px;white-space:nowrap}

  /* Scrollbar */
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-track{background:#0d0d0d}
  ::-webkit-scrollbar-thumb{background:#222;border-radius:2px}
</style>
</head>
<body>
<div class="page">

  <!-- Top bar -->
  <div class="top-bar">
    <div class="page-title">Performer Directory</div>
    <div class="stat-pills">
      <div class="sp blue"><b id="st-total">—</b>Total</div>
      <div class="sp green"><b id="st-active">—</b>Active</div>
      <div class="sp yellow"><b id="st-pending">—</b>Pending</div>
      <div class="sp"><b id="st-inactive">—</b>Inactive</div>
    </div>
    <button class="btn-sm" onclick="load()" style="margin-left:auto">↻ Refresh</button>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-box" id="search-box" type="text" placeholder="Search name, phone, location, skills…" oninput="render()">
    </div>
    <select class="fsel" id="f-status" onchange="render()">
      <option value="">All Status</option>
      <option value="Active">Active</option>
      <option value="Pending">Pending</option>
      <option value="Inactive">Inactive</option>
    </select>
    <select class="fsel" id="f-type" onchange="render()">
      <option value="">All Types</option>
    </select>
    <select class="fsel" id="f-loc" onchange="render()">
      <option value="">All Locations</option>
    </select>
    <span class="result-count" id="result-count"></span>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="no-sort" style="width:36px;text-align:center">#</th>
          <th class="no-sort td-avatar"></th>
          <th onclick="sortBy('name')" id="th-name">Name</th>
          <th onclick="sortBy('phone')" id="th-phone">Phone</th>
          <th onclick="sortBy('email')" id="th-email">Email</th>
          <th onclick="sortBy('location')" id="th-location">Location</th>
          <th onclick="sortBy('performerType')" id="th-performerType">Skills / Act</th>
          <th onclick="sortBy('rate')" id="th-rate">Rate</th>
          <th onclick="sortBy('status')" id="th-status">Status</th>
          <th class="no-sort"></th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr class="tbl-msg"><td colspan="10"><span class="spinner"></span>Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Detail overlay -->
<div class="dp-overlay" id="dp-overlay" onclick="closeDP()"></div>
<div class="dp" id="dp">

  <div class="dp-hd">
    <button class="dp-close-btn" onclick="closeDP()">✕</button>
    <div class="dp-profile">
      <div class="dp-av" id="dp-av">?</div>
      <div>
        <div class="dp-hd-name" id="dp-name">—</div>
        <div class="dp-hd-stage" id="dp-stage">—</div>
        <div class="dp-hd-id" id="dp-id">—</div>
      </div>
    </div>
    <div class="st-row" id="st-row">
      <button class="st-btn" id="stb-Active"   onclick="setStatus('Active')">✓ Active</button>
      <button class="st-btn" id="stb-Pending"  onclick="setStatus('Pending')">● Pending</button>
      <button class="st-btn" id="stb-Inactive" onclick="setStatus('Inactive')">✕ Inactive</button>
    </div>
  </div>

  <div class="dp-body">

    <!-- VIEW -->
    <div id="view-sec">
      <div class="dp-sec">
        <div class="dp-sec-hd">Contact</div>
        <div class="field-grid">
          <div class="field full">
            <div class="lbl">Phone</div>
            <div class="val phone-big" id="dp-v-phone">—</div>
          </div>
          <div class="field full">
            <div class="lbl">Email</div>
            <div class="val" id="dp-v-email">—</div>
          </div>
        </div>
      </div>

      <div class="dp-sec">
        <div class="dp-sec-hd">Booking Info</div>
        <div class="field-grid">
          <div class="field">
            <div class="lbl">Rate</div>
            <div class="val" id="dp-v-rate">—</div>
          </div>
          <div class="field">
            <div class="lbl">Location</div>
            <div class="val" id="dp-v-loc">—</div>
          </div>
          <div class="field">
            <div class="lbl">Gigs</div>
            <div class="val" id="dp-v-gigs">—</div>
          </div>
          <div class="field">
            <div class="lbl">On Since</div>
            <div class="val" id="dp-v-since">—</div>
          </div>
          <div class="field full">
            <div class="lbl">Instagram</div>
            <div class="val" id="dp-v-social">—</div>
          </div>
        </div>
      </div>

      <div class="dp-sec">
        <div class="dp-sec-hd">Skills &amp; Act</div>
        <div class="field full" style="margin-bottom:6px">
          <div class="lbl">Performer Type</div>
          <div class="val" id="dp-v-type">—</div>
        </div>
        <div class="field full">
          <div class="lbl">Bio</div>
          <div class="val" id="dp-v-bio" style="line-height:1.6">—</div>
        </div>
      </div>
    </div>

    <!-- EDIT -->
    <div id="edit-sec" class="edit-section">
      <div class="form-grid-2">
        <div class="form-row">
          <label>Full Name</label>
          <input id="ep-name" type="text">
        </div>
        <div class="form-row">
          <label>Performer Type / Act</label>
          <input id="ep-type" type="text">
        </div>
        <div class="form-row">
          <label>Phone</label>
          <input id="ep-phone" type="tel">
        </div>
        <div class="form-row">
          <label>Email</label>
          <input id="ep-email" type="email">
        </div>
        <div class="form-row">
          <label>Location</label>
          <input id="ep-location" type="text">
        </div>
        <div class="form-row">
          <label>Rate</label>
          <input id="ep-rate" type="text">
        </div>
        <div class="form-row">
          <label>Instagram</label>
          <input id="ep-social" type="text">
        </div>
        <div class="form-row">
          <label>Photo URL</label>
          <input id="ep-photo" type="url">
        </div>
      </div>
      <div class="form-row">
        <label>Bio</label>
        <textarea id="ep-bio"></textarea>
      </div>
    </div>

  </div>

  <div class="dp-ft" id="dp-ft">
    <button class="btn btn-ghost" id="btn-edit" onclick="startEdit()">✏ Edit</button>
    <button class="btn btn-blue" id="btn-save" onclick="saveEdit()" style="display:none;flex:1">Save</button>
    <button class="btn btn-ghost" id="btn-cancel" onclick="cancelEdit()" style="display:none">Cancel</button>
    <span class="save-ok" id="save-ok" style="display:none">Saved ✓</span>
  </div>
</div>

<script>
if (!localStorage.getItem('od_auth')) { window.top.location.href = 'login.html'; }

const CRM = 'https://script.google.com/macros/s/AKfycbwEo1SmfVmXy8WCopvrbmgh3Rmea-2jVTE4VRxfLoj58PuwW3nsaVEroIZuCNJzmC0Jdw/exec';
let all = [], activeId = null, sortCol = 'name', sortDir = 1, editMode = false;

/* ── LOAD ── */
async function load() {
  tbody().innerHTML = '<tr class="tbl-msg"><td colspan="10"><span class="spinner"></span>Loading…</td></tr>';
  stats(null);
  const slow = setTimeout(() => {
    tbody().innerHTML = '<tr class="tbl-msg"><td colspan="10"><span class="spinner"></span>Still loading — Apps Script cold start can take 15–30s…</td></tr>';
  }, 8000);
  try {
    const ctrl = new AbortController();
    const kill = setTimeout(() => ctrl.abort(), 35000);
    const data = await fetch(CRM + '?action=getAllTalent', { signal: ctrl.signal }).then(r => r.json());
    clearTimeout(kill); clearTimeout(slow);
    if (!data.talent) throw new Error(data.error || 'No data');
    all = data.talent;
    populateFilters();
    render();
    stats(all);
  } catch(e) {
    clearTimeout(slow);
    tbody().innerHTML = `<tr class="tbl-msg"><td colspan="10">⚠️ ${e.name==='AbortError'?'Timed out (35s). Try Refresh.':e.message}</td></tr>`;
  }
}

function tbody() { return document.getElementById('tbody'); }

function stats(t) {
  document.getElementById('st-total').textContent   = t ? t.length : '—';
  document.getElementById('st-active').textContent  = t ? t.filter(p=>p.status==='Active').length : '—';
  document.getElementById('st-pending').textContent = t ? t.filter(p=>p.status==='Pending').length : '—';
  document.getElementById('st-inactive').textContent= t ? t.filter(p=>p.status!=='Active'&&p.status!=='Pending').length : '—';
}

function populateFilters() {
  const types = [...new Set(all.map(p=>p.performerType).filter(Boolean))].sort();
  const locs  = [...new Set(all.map(p=>(p.location||'').split(/[,\/]/)[0].trim()).filter(Boolean))].sort();

  const ft = document.getElementById('f-type');
  ft.innerHTML = '<option value="">All Types</option>' + types.map(t=>`<option>${t}</option>`).join('');

  const fl = document.getElementById('f-loc');
  fl.innerHTML = '<option value="">All Locations</option>' + locs.map(l=>`<option>${l}</option>`).join('');
}

/* ── SORT ── */
function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  // Update header indicators
  document.querySelectorAll('th[id^="th-"]').forEach(th => {
    th.classList.remove('sorted-asc','sorted-desc');
  });
  const th = document.getElementById('th-' + col);
  if (th) th.classList.add(sortDir===1 ? 'sorted-asc' : 'sorted-desc');
  render();
}

/* ── RENDER ── */
function render() {
  const q      = document.getElementById('search-box').value.toLowerCase().trim();
  const fstat  = document.getElementById('f-status').value;
  const ftype  = document.getElementById('f-type').value;
  const floc   = document.getElementById('f-loc').value;

  let rows = all;
  if (q) rows = rows.filter(p =>
    (p.name||'').toLowerCase().includes(q) ||
    (p.phone||'').replace(/\D/g,'').includes(q.replace(/\D/g,'')) ||
    (p.email||'').toLowerCase().includes(q) ||
    (p.location||'').toLowerCase().includes(q) ||
    (p.performerType||'').toLowerCase().includes(q) ||
    (p.social||'').toLowerCase().includes(q) ||
    (p.bio||'').toLowerCase().includes(q)
  );
  if (fstat) rows = rows.filter(p => p.status === fstat);
  if (ftype) rows = rows.filter(p => p.performerType === ftype);
  if (floc)  rows = rows.filter(p => (p.location||'').startsWith(floc));

  // Sort
  rows = rows.slice().sort((a,b) => {
    const va = (a[sortCol]||'').toString().toLowerCase();
    const vb = (b[sortCol]||'').toString().toLowerCase();
    // Status special order
    if (sortCol === 'status') {
      const o = {Active:0,Pending:1};
      return ((o[a.status]??2) - (o[b.status]??2)) * sortDir;
    }
    return va < vb ? -sortDir : va > vb ? sortDir : 0;
  });

  document.getElementById('result-count').textContent =
    rows.length === all.length ? `${rows.length} performers` : `${rows.length} / ${all.length}`;

  if (!rows.length) {
    tbody().innerHTML = '<tr class="tbl-msg"><td colspan="10">No performers match your filters.</td></tr>';
    return;
  }

  tbody().innerHTML = rows.map((p, i) => buildRow(p, i + 1)).join('');
}

function buildRow(p, n) {
  const init = (p.name||'?')[0].toUpperCase();
  const av   = p.photo
    ? `<img src="${p.photo}" alt="" onerror="this.style.display='none';this.parentNode.textContent='${init}'">`
    : init;

  const badge = p.status==='Active'  ? 'badge-active'
              : p.status==='Pending' ? 'badge-pending' : 'badge-inactive';

  const phone = (p.phone||'').trim();
  const email = (p.email||'').trim();
  const phoneCell = phone && phone.length > 3
    ? `<a class="phone-link" href="tel:${phone}" onclick="event.stopPropagation()">${phone}</a>`
    : `<span class="no-data">—</span>`;
  const emailCell = email && email.includes('@')
    ? `<a class="email-link" href="mailto:${email}" onclick="event.stopPropagation()" title="${email}">${email}</a>`
    : `<span class="no-data">—</span>`;

  const skills = (p.performerType||'').split(/[,\/&+]/).map(s=>s.trim()).filter(s=>s.length>0).slice(0,3);
  const skillsCell = skills.length
    ? `<div class="skill-tags">${skills.map(s=>`<span class="skill-tag">${s}</span>`).join('')}</div>`
    : `<span class="no-data">—</span>`;

  const loc  = p.location || '<span class="no-data">—</span>';
  const rate = p.rate     || '<span class="no-data">—</span>';

  return `<tr id="row-${p.id}"${activeId===p.id?' class="selected"':''} onclick="openDP('${p.id}')">
    <td class="td-num">${n}</td>
    <td class="td-avatar"><div class="avatar">${av}</div></td>
    <td class="td-name">
      <div class="n-name">${p.name||'—'}</div>
      ${p.social ? `<div class="n-stage">@${p.social}</div>` : ''}
    </td>
    <td class="td-phone">${phoneCell}</td>
    <td><div style="max-width:180px;overflow:hidden;text-overflow:ellipsis">${emailCell}</div></td>
    <td class="td-loc">${loc}</td>
    <td class="td-skills">${skillsCell}</td>
    <td style="color:#666">${rate}</td>
    <td class="td-status"><span class="badge ${badge}">${p.status||'Inactive'}</span></td>
    <td class="td-act"><button class="row-btn" onclick="event.stopPropagation();openDP('${p.id}')">→</button></td>
  </tr>`;
}

/* ── DETAIL PANEL ── */
function openDP(id) {
  const p = all.find(x => x.id === id);
  if (!p) return;
  activeId = id;

  // Highlight row
  document.querySelectorAll('tbody tr.selected').forEach(r => r.classList.remove('selected'));
  const row = document.getElementById('row-' + id);
  if (row) row.classList.add('selected');

  // Avatar
  const init = (p.name||'?')[0].toUpperCase();
  document.getElementById('dp-av').innerHTML = p.photo
    ? `<img src="${p.photo}" alt="" onerror="this.parentNode.textContent='${init}'">`
    : init;

  document.getElementById('dp-name').textContent  = p.name || '—';
  document.getElementById('dp-stage').textContent = p.performerType ? `Act: ${p.performerType}` : 'No act type set';
  document.getElementById('dp-id').textContent    = p.id;

  setStatusToggle(p.status);

  // View fields
  const ph = (p.phone||'').trim();
  const em = (p.email||'').trim();
  const dv = document.getElementById('dp-v-phone');
  if (ph && ph.length > 3) {
    dv.innerHTML = `<a href="tel:${ph}" style="color:#00AFF0;text-decoration:none">${ph}</a>`;
    dv.className = 'val phone-big';
  } else { dv.textContent = 'Not on file'; dv.className = 'val dim'; }

  const de = document.getElementById('dp-v-email');
  if (em && em.includes('@')) de.innerHTML = `<a href="mailto:${em}">${em}</a>`;
  else { de.textContent = 'Not on file'; de.className = 'val dim'; }

  setField('dp-v-rate',  p.rate,        'Not set');
  setField('dp-v-loc',   p.location,    'Unknown');
  setField('dp-v-gigs',  p.gigs,        '0');
  setField('dp-v-since', p.submittedAt, 'Unknown');

  const soc = (p.social||'').trim();
  const ds  = document.getElementById('dp-v-social');
  if (soc) ds.innerHTML = `<a href="https://instagram.com/${soc}" target="_blank">@${soc}</a>`;
  else { ds.textContent = '—'; ds.className = 'val dim'; }

  setField('dp-v-type', p.performerType, 'Not set');
  setField('dp-v-bio',  p.bio,           'No bio yet');

  cancelEdit();

  document.getElementById('dp-overlay').classList.add('open');
  document.getElementById('dp').classList.add('open');
}

function setField(id, val, fallback) {
  const el = document.getElementById(id);
  if (!el) return;
  const v = (val||'').trim();
  if (v) { el.textContent = v; el.className = 'val'; }
  else   { el.textContent = fallback||'—'; el.className = 'val dim'; }
}

function closeDP() {
  document.getElementById('dp-overlay').classList.remove('open');
  document.getElementById('dp').classList.remove('open');
  document.querySelectorAll('tbody tr.selected').forEach(r => r.classList.remove('selected'));
  activeId = null;
  cancelEdit();
}

/* ── STATUS TOGGLE ── */
function setStatusToggle(status) {
  ['Active','Pending','Inactive'].forEach(s => {
    const b = document.getElementById('stb-' + s);
    b.className = 'st-btn';
    if (s === status) b.classList.add('is-' + s.toLowerCase());
  });
}

async function setStatus(newStatus) {
  if (!activeId) return;
  const p = all.find(x => x.id === activeId);
  if (!p || p.status === newStatus) return;
  const row = document.getElementById('st-row');
  row.classList.add('saving');
  const old = p.status;
  p.status = newStatus;
  setStatusToggle(newStatus);
  try {
    const r = await fetch(`${CRM}?${new URLSearchParams({action:'updateTalent',id:p.id,status:newStatus})}`).then(r=>r.json());
    if (!r.success) throw new Error(r.error||'Failed');
    stats(all);
    render();
    const tr = document.getElementById('row-' + activeId);
    if (tr) tr.classList.add('selected');
  } catch(e) {
    p.status = old; setStatusToggle(old);
    alert('Failed: ' + e.message);
  } finally { row.classList.remove('saving'); }
}

/* ── EDIT ── */
function startEdit() {
  const p = all.find(x => x.id === activeId);
  if (!p) return;
  editMode = true;
  document.getElementById('view-sec').classList.add('hide');
  document.getElementById('edit-sec').classList.add('show');
  document.getElementById('btn-edit').style.display   = 'none';
  document.getElementById('btn-save').style.display   = 'block';
  document.getElementById('btn-cancel').style.display = 'block';
  document.getElementById('ep-name').value     = p.name || '';
  document.getElementById('ep-type').value     = p.performerType || '';
  document.getElementById('ep-phone').value    = p.phone || '';
  document.getElementById('ep-email').value    = p.email || '';
  document.getElementById('ep-location').value = p.location || '';
  document.getElementById('ep-rate').value     = p.rate || '';
  document.getElementById('ep-social').value   = p.social || '';
  document.getElementById('ep-photo').value    = p.photo || '';
  document.getElementById('ep-bio').value      = p.bio || '';
}

function cancelEdit() {
  editMode = false;
  document.getElementById('view-sec').classList.remove('hide');
  document.getElementById('edit-sec').classList.remove('show');
  document.getElementById('btn-edit').style.display   = 'block';
  document.getElementById('btn-save').style.display   = 'none';
  document.getElementById('btn-cancel').style.display = 'none';
  document.getElementById('save-ok').style.display    = 'none';
}

async function saveEdit() {
  const p = all.find(x => x.id === activeId);
  if (!p) return;
  const fields = {
    name: document.getElementById('ep-name').value.trim(),
    performerType: document.getElementById('ep-type').value.trim(),
    phone: document.getElementById('ep-phone').value.trim(),
    email: document.getElementById('ep-email').value.trim(),
    location: document.getElementById('ep-location').value.trim(),
    rate: document.getElementById('ep-rate').value.trim(),
    social: document.getElementById('ep-social').value.trim().replace(/^@/,''),
    photo: document.getElementById('ep-photo').value.trim(),
    bio: document.getElementById('ep-bio').value.trim()
  };
  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    const r = await fetch(`${CRM}?${new URLSearchParams({action:'updateTalent',id:p.id,...fields})}`).then(r=>r.json());
    if (!r.success) throw new Error(r.error||'Save failed');
    Object.assign(p, fields);
    cancelEdit();
    openDP(p.id);
    const ok = document.getElementById('save-ok');
    ok.style.display = 'inline-block';
    setTimeout(() => ok.style.display='none', 2500);
    render();
  } catch(e) { alert('Save failed: ' + e.message); }
  finally { btn.disabled=false; btn.textContent='Save'; }
}

load();
</script>
</body>
